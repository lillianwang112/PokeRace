      const [sprites,setSprites]=useState({});
      useEffect(()=>{
        prefetchSprites((id,url)=>setSprites(p=>({...p,[id]:url})));
      },[]);
      const [view,setView]=useState("menu");
      const [raceConfig,setRaceConfig]=useState(null);
      const [lastResult,setLastResult]=useState(null);
      const [toasts,setToasts]=useState([]);

      useEffect(()=>{save(STORE_KEYS.settings,settings)},[settings]);
      useEffect(()=>{save(STORE_KEYS.lectures,lectures)},[lectures]);
      useEffect(()=>{save(STORE_KEYS.races,races)},[races]);
      useEffect(()=>{save(STORE_KEYS.achievements,achievements)},[achievements]);
      useEffect(()=>{save(STORE_KEYS.player,player)},[player]);
      useEffect(()=>{if(settings.theme==="dark")document.body.classList.remove("light-mode");else document.body.classList.add("light-mode");},[settings.theme]);

      const toast=useCallback((msg,icon)=>{const id=Date.now()+Math.random();setToasts(p=>[...p,{id,msg,icon}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);},[]);
      const setSetting=(k,v)=>setSettings(p=>({...p,[k]:v}));

      const checkAch=useCallback((newRaces,extra={})=>{
        const stats=getStats(newRaces,{...player,...extra});
        ACHIEVEMENTS.forEach(a=>{
          if(!achievements.includes(a.id)&&a.check(stats,extra)){
            setAchievements(p=>{const n=[...p,a.id];save(STORE_KEYS.achievements,n);return n;});
            toast(`${a.name} unlocked!`,a.icon);
            if(settings.soundOn)sfx("ach");
          }
        });
      },[achievements,player,settings.soundOn,toast]);

      const handleStart=(config)=>{setRaceConfig(config);setView("race");};

      const handleFinish=(result)=>{
        const diff=DIFFICULTY[settings.difficulty];
        const oldLevel=getLevel(player.xp).level;

        // Daily challenge: 2× XP if today's challenge completed
        const today=new Date().toDateString();
        const isDailyChallenge=player.dailyChallengeDate!==today&&raceConfig.isDaily;
        const dailyMult=isDailyChallenge?2:1;
        if(isDailyChallenge)setPlayer(p=>({...p,dailyChallengeDate:today,dailyStreak:(p.dailyStreak||0)+1}));

        // Passive XP bonuses
        const poke=POKEMON.find(p=>p.id===settings.selectedPokemon)||POKEMON[0];
        const espeonBonus=(poke.passive==='word_streak'||poke.passive==='all')&&result.perfectWords>0
          ?Math.floor(result.perfectWords*3):0;

        const baseXP=Math.floor(result.wpm*(result.accuracy/100)*diff.xpMult*dailyMult);
        const comboXP=result.bestCombo>=20?Math.floor(baseXP*0.2):0;
        const totalXP=baseXP+comboXP+espeonBonus;

        // Subject mastery XP
        const masteryUpdate={...(player.mastery||{})};
        (raceConfig.selectedLectureIds||[]).forEach(lid=>{
          const cur=masteryUpdate[lid];
          const prevXp=typeof cur==='number'?cur:(cur?.xp||0);
          masteryUpdate[lid]=prevXp+Math.floor(totalXP/Math.max(1,(raceConfig.selectedLectureIds||[]).length));
        });

        const newRace={id:Date.now(),timestamp:Date.now(),wpm:result.wpm,accuracy:result.accuracy,
          mode:raceConfig.mode,difficulty:settings.difficulty,bestCombo:result.bestCombo||0,timeSec:result.timeSec,
          pokemon:settings.selectedPokemon,xpEarned:totalXP,
          lectureIds:raceConfig.selectedLectureIds||[]};
        // Prune oldest records to keep localStorage healthy (cap at 200)
        let updRaces=[...races,newRace];
        if(updRaces.length>200)updRaces=updRaces.slice(-180);
        setRaces(updRaces);

        const updPlayer={...player,xp:player.xp+totalXP,totalRaces:player.totalRaces+1,
          bestWpm:Math.max(player.bestWpm,result.wpm),bestCombo:Math.max(player.bestCombo,result.bestCombo||0),
          mastery:masteryUpdate};
        setPlayer(updPlayer);

        const newLevel=getLevel(updPlayer.xp).level;
        if(newLevel>oldLevel){toast(`Level Up! Now Level ${newLevel}!`,"🎉");if(settings.soundOn)sfx("lvlup");}
        if(isDailyChallenge){toast("Daily Challenge complete! 2× XP!","⭐");if(settings.soundOn)sfx("combo");}
        if(espeonBonus>0)toast(`Espeon Bonus! +${espeonBonus} XP from perfect words!`,"🌸");

        // Level-based pokemon unlocks
        const newUnlocks=POKEMON.filter(p=>p.unlock>0&&p.unlock<=newLevel&&p.unlock>oldLevel);
        newUnlocks.forEach(p=>toast(`${p.name} unlocked! Check the Garage!`,p.emoji));

        const extra={
          raceComplete:true,
          totalErrors:result.totalErrors||0,
          raceNitros:result.raceNitros||0,
          fireSpinUsed:result.fireSpinUsed||false,
          perfectWords:result.perfectWords||0,
          isPractice:raceConfig.mode==='solo',
          xp:updPlayer.xp,level:newLevel,
          nitroUses:updPlayer.nitroUses||0,
        };
        setLastResult({...result,mode:raceConfig.mode,xpEarned:totalXP,bonusXP:comboXP+espeonBonus,
          lectureName:raceConfig.lectureName,passage:raceConfig.passage,
          xpBefore:player.xp,xpAfter:player.xp+totalXP,
          levelBefore:oldLevel,levelAfter:newLevel,
          isNewBest:result.wpm>player.bestWpm});
        setView("results");
        checkAch(updRaces,extra);
        if(settings.soundOn)sfx("win");
        launchConfetti();
      };

      const raceAgain=()=>{
        if(!raceConfig?.selectedLectureIds?.length){setView("menu");return;}
        const sel=lectures.filter(l=>raceConfig.selectedLectureIds.includes(l.id));
        const allP=sel.flatMap(l=>l.passages.map(p=>({text:p,lectureId:l.id})));
        if(!allP.length){setView("menu");return;}
        const chosen=allP[Math.floor(Math.random()*allP.length)];
        const diff=DIFFICULTY[settings.difficulty];
        const pText=truncPassage(chosen.text,diff.maxLen);
        const avg=calcAvgWPM(races);
        const bots=BOT_POKEMON.map(b=>({...b,wpm:avg*b.mult*diff.botMult*(0.96+Math.random()*0.08)}));
        const lectureName=sel.length===1?sel[0].name:sel.map(l=>l.name.slice(0,10)).join(', ');
        setRaceConfig({mode:raceConfig.mode,selectedLectureIds:raceConfig.selectedLectureIds,passage:pText,bots,lectureName});
        setView("race");
      };

      const startPractice=useCallback((lecId)=>{
        const lec=lectures.find(l=>l.id===lecId);
        if(!lec||!lec.passages.length){toast('Add passages to this lecture first!');return;}
        const chosen=lec.passages[Math.floor(Math.random()*lec.passages.length)];
        const diff=DIFFICULTY[settings.difficulty];
        const pText=truncPassage(chosen,diff.maxLen);
        const avg=calcAvgWPM(races);
        const bots=BOT_POKEMON.map(b=>({...b,wpm:avg*b.mult*diff.botMult*(0.96+Math.random()*0.08)}));
        setRaceConfig({mode:'solo',selectedLectureIds:[lecId],passage:pText,bots,lectureName:lec.name});
        setView('race');
      },[lectures,settings.difficulty,races]);
      const ctx={settings,setSetting,lectures,setLectures,races,setRaces,achievements,player,setPlayer,toast,POKEMON,sprites,startPractice};
      const lvl=getLevel(player.xp);

      return(
        <Ctx.Provider value={ctx}>
          <div className="relative min-h-screen flex flex-col">
            {/* Arena atmosphere layers */}
            <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
              {/* Deep colour blooms */}
              <div className="absolute -top-40 -left-40 w-[600px] h-[600px] rounded-full animate-glow-pulse" style={{background:'radial-gradient(circle,rgba(139,92,246,0.12) 0%,transparent 70%)'}}></div>
              <div className="absolute -bottom-40 -right-40 w-[600px] h-[600px] rounded-full animate-glow-pulse" style={{background:'radial-gradient(circle,rgba(56,189,248,0.10) 0%,transparent 70%)',animationDelay:'1.5s'}}></div>
              <div className="absolute top-1/3 right-1/4 w-[400px] h-[400px] rounded-full animate-glow-pulse" style={{background:'radial-gradient(circle,rgba(250,204,21,0.06) 0%,transparent 70%)',animationDelay:'3s'}}></div>
              {/* Floating particles */}
              {[
                {l:'12%',top:'80%',cls:'',dur:'18s',delay:'0s'},
                {l:'25%',top:'90%',cls:'blue',dur:'22s',delay:'4s'},
                {l:'38%',top:'75%',cls:'white',dur:'16s',delay:'8s'},
                {l:'52%',top:'85%',cls:'',dur:'20s',delay:'2s'},
                {l:'65%',top:'92%',cls:'blue',dur:'25s',delay:'6s'},
                {l:'74%',top:'78%',cls:'white',dur:'19s',delay:'1s'},
                {l:'85%',top:'88%',cls:'',dur:'23s',delay:'10s'},
                {l:'8%',top:'60%',cls:'blue',dur:'21s',delay:'3s'},
                {l:'45%',top:'70%',cls:'white',dur:'17s',delay:'7s'},
                {l:'92%',top:'65%',cls:'',dur:'24s',delay:'5s'},
                {l:'30%',top:'95%',cls:'blue',dur:'26s',delay:'9s'},
                {l:'58%',top:'82%',cls:'',dur:'15s',delay:'12s'},
              ].map((p,i)=>(
                <div key={i} className={`particle ${p.cls}`} style={{left:p.l,top:p.top,animationDuration:p.dur,animationDelay:p.delay}}></div>
              ))}
              {/* Running Pokémon silhouettes — mix LTR and RTL at different speeds/sizes */}
              {[
                {shape:'M0,16 Q4,0 8,4 Q12,0 16,8 L14,16 Q8,20 2,16Z',dur:'26s',delay:'0s',size:30,bottom:'2%',opacity:0.07,rtl:false},
                {shape:'M0,10 Q5,0 10,3 L14,8 Q12,14 8,16 Q3,14 0,10Z',dur:'18s',delay:'5s',size:18,bottom:'7%',opacity:0.05,rtl:true},
                {shape:'M2,14 Q0,6 6,2 Q12,0 14,6 L12,14 Q8,18 4,16Z',dur:'38s',delay:'12s',size:42,bottom:'1%',opacity:0.06,rtl:false},
                {shape:'M0,12 Q2,0 8,2 Q14,0 16,6 L14,14 Q8,18 2,14Z',dur:'22s',delay:'19s',size:16,bottom:'4%',opacity:0.04,rtl:true},
                {shape:'M0,8 Q4,0 10,2 L16,8 Q14,16 8,18 Q2,14 0,8Z',dur:'30s',delay:'8s',size:26,bottom:'6%',opacity:0.05,rtl:false},
                {shape:'M0,16 Q4,0 8,4 Q12,0 16,8 L14,16 Q8,20 2,16Z',dur:'15s',delay:'23s',size:14,bottom:'3%',opacity:0.04,rtl:true},
                {shape:'M2,14 Q0,6 6,2 Q12,0 14,6 L12,14 Q8,18 4,16Z',dur:'44s',delay:'1s',size:52,bottom:'8%',opacity:0.035,rtl:false},
              ].map((s,i)=>(
                <div key={'sil'+i} className={`poke-silhouette ${s.rtl?'sil-rtl':'sil-ltr'}`} style={{animationDuration:s.dur,animationDelay:s.delay,bottom:s.bottom,opacity:s.opacity}}>
                  <svg width={s.size} height={s.size} viewBox="0 0 16 20" fill="rgba(255,255,255,0.9)">
                    <path d={s.shape}/>
                    <circle cx="12" cy="4" r="3" fill="rgba(255,255,255,0.9)"/>
                    <circle cx="4" cy="16" r="2.5" fill="rgba(255,255,255,0.9)"/>
                    <circle cx="12" cy="16" r="2.5" fill="rgba(255,255,255,0.9)"/>
                    <line x1="0" y1="20" x2="16" y2="20" stroke="rgba(255,255,255,0.5)" strokeWidth="1.5"/>
                  </svg>
                </div>
              ))}
            </div>

            <div className="relative z-10 w-full max-w-6xl mx-auto p-3 md:p-6 flex-1">
              <Header view={view} setView={setView} lvl={lvl} />

              <main className="glass rounded-3xl p-4 md:p-8 animate-fade min-h-[60vh]">
                {view==="menu"&&<MainMenu onStart={handleStart} onNav={setView} lastResult={lastResult}/>}
                {view==="manage"&&<LectureManager/>}
                {view==="race"&&raceConfig&&<RaceScreen config={raceConfig} onFinish={handleFinish}/>}
                {view==="results"&&lastResult&&<ResultsScreen result={lastResult} onMenu={()=>setView("menu")} onAgain={raceAgain} onNav={setView}
                  onRetry={()=>{if(lastResult.passage&&raceConfig){const avg=calcAvgWPM(races);const diff=DIFFICULTY[settings.difficulty];const bots=BOT_POKEMON.map(b=>({...b,wpm:avg*b.mult*diff.botMult*(0.96+Math.random()*0.08)}));setRaceConfig({...raceConfig,passage:lastResult.passage,bots});setView("race");}}}/>}
                {view==="garage"&&<Garage/>}
                {view==="stats"&&<Stats/>}
                {view==="achievements"&&<AchScreen/>}
                {view==="settings"&&<SettingsScreen/>}
              </main>
              <footer className="text-center text-[10px] mt-4 mb-2" style={{color:'var(--text-muted)',fontFamily:'Space Mono,monospace'}}>PokéRace — Gotta Type 'Em All! · All data stored locally.</footer>
            </div>

            {/* Toasts */}
            <div className="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
              {toasts.map(t=>(
                <div key={t.id} className="toast-enter glass rounded-2xl px-4 py-3 flex items-center gap-3 shadow-xl border border-yellow-500/20">
                  <span className="text-2xl">{t.icon}</span>
                  <span className="text-sm font-semibold text-yellow-300">{t.msg}</span>
                </div>
              ))}
            </div>
          </div>
        </Ctx.Provider>
      );
    }

    /* ═══════════════════ HEADER ═══════════════════ */
    function Header({view,setView,lvl}){
      const {settings,setSetting,player}=useContext(Ctx);
      const poke=POKEMON.find(p=>p.id===settings.selectedPokemon)||POKEMON[0];
      const xpPct=Math.min(100,(lvl.currentXp/lvl.needed)*100);

      return(
        <header className="mb-4 animate-slide-up">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-3">
              <div className="text-3xl md:text-4xl animate-bounce-slow">⚡</div>
              <div>
                <h1 className="text-3xl md:text-4xl font-black tracking-wide game-title">
                  <span className="gradient-text">PokéRace</span>
                </h1>
                <p className="text-[10px] md:text-xs font-ui" style={{color:'var(--text-muted)'}}>Gotta Type 'Em All!</p>
              </div>
            </div>
            <nav className="flex items-center gap-1.5">
              <button onClick={()=>setSetting("theme",settings.theme==="dark"?"light":"dark")} className="p-2 rounded-xl glass hover:brightness-110 text-sm" title="Theme">{settings.theme==="dark"?"☀️":"🌙"}</button>
              <button onClick={()=>setSetting("soundOn",!settings.soundOn)} className="p-2 rounded-xl glass hover:brightness-110 text-sm" title="Sound">{settings.soundOn?"🔊":"🔇"}</button>
              <button onClick={()=>setView("settings")} className="p-2 rounded-xl glass hover:brightness-110 text-sm" title="Settings">⚙️</button>
              {view!=="menu"&&<button onClick={()=>setView("menu")} className="px-3 py-2 rounded-xl glass hover:brightness-110 text-sm font-bold">Menu</button>}
            </nav>
          </div>
          {/* XP Bar */}
          <div className="glass rounded-2xl px-4 py-2 flex items-center gap-3">
            <div className="text-2xl">{poke.emoji}</div>
            <div className="flex-1">
              <div className="flex items-center justify-between mb-1">
                <span className="text-xs font-bold" style={{color:poke.color,fontFamily:'Space Mono,monospace'}}>{poke.name}</span>
                <span className="text-xs font-ui" style={{color:'var(--text-muted)'}}>Lvl <span className="font-bold" style={{color:'var(--accent-primary)'}}>{lvl.level}</span> · {lvl.currentXp}/{lvl.needed} XP</span>
              </div>
              <div className="h-2 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.06)'}}>
                <div className="xp-bar h-full rounded-full bg-gradient-to-r from-yellow-400 via-amber-400 to-orange-400" style={{width:`${xpPct}%`}}/>
              </div>
            </div>
          </div>
        </header>
      );
    }

    /* ═══════════════════ MAIN MENU ═══════════════════ */
    function MainMenu({onStart,onNav,lastResult}){
      const {settings,setSetting,lectures,races,player,achievements,sprites}=useContext(Ctx);
      const [mode,setMode]=useState("single");
      const [selIds,setSelIds]=useState([]);
      const avg=calcAvgWPM(races);
      const streak=getStreak(races);
      const recent=races.slice(-5).reverse();
      const lvl=getLevel(player.xp);
      const poke=POKEMON.find(p=>p.id===settings.selectedPokemon)||POKEMON[0];
      const daily=getDailyChallenge(lectures);
      const today=new Date().toDateString();
      const dailyDone=player.dailyChallengeDate===today;

      useEffect(()=>{if(lectures.length&&!selIds.length)setSelIds([lectures[0].id]);},[lectures]);

      const toggle=(id)=>setSelIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
      const handleStart=()=>{
        if(!selIds.length)return alert("Select at least one topic!");
        const sel=lectures.filter(l=>selIds.includes(l.id));
        const allP=sel.flatMap(l=>l.passages.map(p=>({text:p})));
        if(!allP.length)return alert("No passages found. Add some first!");
        const chosen=allP[Math.floor(Math.random()*allP.length)];
        const diff=DIFFICULTY[settings.difficulty];
        const pText=truncPassage(chosen.text,diff.maxLen);
        const bots=BOT_POKEMON.map(b=>({...b,wpm:avg*b.mult*diff.botMult*(0.96+Math.random()*0.08)}));
        const lectureName=sel.length===1?sel[0].name:sel.map(l=>l.name.slice(0,10)).join(', ');
        onStart({mode,selectedLectureIds:selIds,passage:pText,bots,lectureName});
      };
      const handleStartDaily=()=>{
        if(!daily)return;
        const diff=DIFFICULTY[settings.difficulty];
        const pText=truncPassage(daily.text,diff.maxLen);
        const bots=BOT_POKEMON.map(b=>({...b,wpm:avg*b.mult*diff.botMult*(0.96+Math.random()*0.08)}));
        onStart({mode:'single',selectedLectureIds:[daily.lectureId],passage:pText,bots,lectureName:daily.name,isDaily:true});
      };

      return(
        <div className="space-y-5 animate-fade">
          {/* Stats row */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2.5">
            <MiniStat icon="⚡" label="Avg WPM" value={avg.toFixed(0)} color="text-yellow-400"/>
            <MiniStat icon="🏁" label="Races" value={player.totalRaces} color="text-blue-400"/>
            <MiniStat icon={streak>=3?"🔥":"🔥"} label="Streak" value={`${streak}d`} color="text-orange-400" pulse={streak>=3}/>
            <MiniStat icon="🏆" label="Badges" value={`${achievements.length}/${ACHIEVEMENTS.length}`} color="text-purple-400"/>
          </div>

          <div className="grid md:grid-cols-[2fr,1.2fr] gap-5">
            <section className="space-y-3">
              <h2 className="text-xl font-black flex items-center gap-2" style={{fontFamily:"'Fredoka One',sans-serif"}}>
                <span className="text-2xl">{poke.emoji}</span> Battle Arena
                <span className="text-[9px] font-medium px-2 py-1 rounded-full bg-red-500/20 text-red-300 border border-red-500/30 font-sans">RACE</span>
              </h2>

              {/* Difficulty */}
              <div className="flex gap-2">
                {Object.entries(DIFFICULTY).map(([k,v])=>(
                  <button key={k} onClick={()=>setSetting("difficulty",k)}
                    className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${settings.difficulty===k?"bg-gradient-to-r from-red-500 to-yellow-500 text-white shadow-lg shadow-red-500/20":"glass-dark border border-transparent hover:border-slate-600 text-slate-400"}`}>
                    {v.label}
                  </button>
                ))}
              </div>

              {/* Mode */}
              <div className="flex gap-2">
                {[["single","Single Topic"],["mixed","Mixed Review"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setMode(k)}
                    className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${mode===k?"bg-white text-slate-900 shadow-lg":"glass-dark border border-transparent hover:border-slate-600"}`}>
                    {l}
                  </button>
                ))}
              </div>

              {/* Topic selection */}
              <div className="glass-dark rounded-2xl p-3 border border-slate-700/50">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-bold">Choose {mode==="single"?"a":"your"} topic{mode==="mixed"?"s":""}</span>
                  {mode==="mixed"&&lectures.length>0&&(
                    <button className="text-[10px] text-slate-400 hover:text-white underline" onClick={()=>setSelIds(selIds.length===lectures.length?[]:lectures.map(l=>l.id))}>
                      {selIds.length===lectures.length?"Clear":"Select all"}
                    </button>
                  )}
                </div>
                <div className="max-h-48 overflow-auto space-y-1 pr-1">
                  {lectures.length===0?(
                    <p className="text-xs text-slate-500 py-6 text-center">No topics yet! Go to Manage to add your study material.</p>
                  ):(()=>{
                    const grouped={};
                    lectures.forEach(lec=>{const g=lec.tag||'General';if(!grouped[g])grouped[g]=[];grouped[g].push(lec);});
                    const groupKeys=Object.keys(grouped).sort((a,b)=>a==='General'?1:b==='General'?-1:a.localeCompare(b));
                    const multiGroup=groupKeys.length>1;
                    return groupKeys.map(group=>(
                      <div key={group}>
                        {multiGroup&&<div className="text-[9px] font-bold font-ui uppercase px-1 pt-2 pb-0.5" style={{color:'var(--text-muted)',letterSpacing:'0.07em'}}>{group}</div>}
                        {grouped[group].map(lec=>{
                          const s=selIds.includes(lec.id);
                          return(
                            <label key={lec.id} className={`flex items-center justify-between px-3 py-2.5 rounded-xl text-sm cursor-pointer transition-all ${s?"bg-yellow-500/15 border border-yellow-400/40":"glass-dark border border-transparent hover:border-slate-600"}`}>
                              <div className="flex items-center gap-2.5">
                                <input type={mode==="single"?"radio":"checkbox"} name="topic" checked={s}
                                  onChange={()=>mode==="single"?setSelIds([lec.id]):toggle(lec.id)} className="accent-yellow-400"/>
                                <span className="font-medium">{lec.name}</span>
                              </div>
                              <span className="text-[10px] text-slate-400">{lec.passages.length} passage{lec.passages.length!==1?"s":""}</span>
                            </label>
                          );
                        })}
                      </div>
                    ));
                  })()}
                </div>
              </div>

              <button onClick={handleStart} disabled={!lectures.length}
                className="w-full py-4 rounded-2xl bg-gradient-to-r from-red-500 via-yellow-500 to-blue-500 text-white font-black text-lg shadow-xl shadow-red-500/20 disabled:opacity-30 disabled:cursor-not-allowed transition-all hover:shadow-2xl hover:shadow-yellow-500/30 active:scale-[0.97]"
                style={{fontFamily:"'Fredoka One',sans-serif"}}>
                START RACE!
              </button>
            </section>

            <section className="space-y-3">
              {/* Daily Challenge card */}
              {daily&&(
                <div className={`rounded-2xl p-3 border transition-all ${dailyDone?"border-slate-700/30 opacity-60":"border-yellow-500/40 bg-gradient-to-br from-yellow-500/10 to-orange-500/10"}`}>
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5">
                      <span className="text-base">⭐</span>
                      <span className="text-xs font-black" style={{fontFamily:"'Fredoka One',sans-serif"}}>Daily Challenge</span>
                      {!dailyDone&&<span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-yellow-500/20 border border-yellow-500/30 text-yellow-400">2× XP</span>}
                      {dailyDone&&<span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-green-500/20 border border-green-500/30 text-green-400">✓ DONE</span>}
                    </div>
                    {streak>0&&<div className="flex items-center gap-1 text-orange-400 text-[10px] font-bold"><span style={{display:'inline-block',animation:streak>2?'pulse 1s infinite':'none'}}>🔥</span>{streak}d</div>}
                  </div>
                  <p className="text-[10px] text-slate-400 mb-2 truncate">📚 {daily.name}</p>
                  <button onClick={handleStartDaily} disabled={dailyDone}
                    className="w-full py-1.5 rounded-xl text-xs font-black transition-all disabled:opacity-40 disabled:cursor-not-allowed hover:brightness-110"
                    style={{background:dailyDone?'rgba(255,255,255,0.05)':'linear-gradient(135deg,#f59e0b,#ef4444)',color:dailyDone?'#64748b':'#000',fontFamily:"'Fredoka One',sans-serif"}}>
                    {dailyDone?'Completed Today!':'Start Daily Race →'}
                  </button>
                </div>
              )}
              <div className="grid grid-cols-2 gap-2">
                <MenuBtn icon="📝" label="Manage" desc="Topics & passages" onClick={()=>onNav("manage")}/>
                <MenuBtn icon="🏠" label="Garage" desc="Your Pokemon" onClick={()=>onNav("garage")}/>
                <MenuBtn icon="📊" label="Stats" desc="Performance" onClick={()=>onNav("stats")}/>
                <MenuBtn icon="🏆" label="Badges" desc={`${achievements.length} earned`} onClick={()=>onNav("achievements")}/>
              </div>

              {/* Trainer Card */}
              <div className="glass-dark rounded-2xl p-3 border border-slate-700/50">
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 overflow-hidden"
                    style={{background:`${poke.color}22`,border:`1.5px solid ${poke.color}44`}}>
                    {sprites[poke.id]
                      ?<img src={sprites[poke.id]} alt={poke.name} width={44} height={44} style={{imageRendering:'pixelated'}}/>
                      :<span className="text-2xl">{poke.emoji}</span>
                    }
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-black" style={{color:poke.color}}>{poke.name}</div>
                    <div className="text-[9px] text-slate-400">Level {lvl.level} Trainer</div>
                    <div className="h-1 rounded-full mt-1 overflow-hidden" style={{background:'rgba(255,255,255,0.08)'}}>
                      <div className="h-full rounded-full" style={{width:`${(lvl.currentXp/lvl.needed)*100}%`,background:poke.color}}/>
                    </div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className="text-[10px] text-slate-400">Win rate</div>
                    <div className="text-sm font-black text-yellow-400">
                      {races.length?`${Math.round(races.filter(r=>r.placement===1).length/races.length*100)}%`:'—'}
                    </div>
                  </div>
                </div>
              </div>

              {/* Last Race WPM strip */}
              {lastResult?.wpmHistory?.length>1&&(
                <div className="glass-dark rounded-2xl p-3 border border-slate-700/50">
                  <div className="text-[10px] font-bold text-slate-400 mb-2">Last Race WPM</div>
                  <div className="flex items-end gap-[2px] h-10">
                    {lastResult.wpmHistory.map((h,i)=>{
                      const maxW=Math.max(...lastResult.wpmHistory.map(x=>x.wpm),1);
                      const pct=(h.wpm/maxW)*100;
                      const col=h.wpm>=80?'#f97316':h.wpm>=60?'#facc15':'#38bdf8';
                      return <div key={i} className="flex-1 rounded-t" style={{height:`${Math.max(pct,6)}%`,background:col,opacity:0.8}}/>;
                    })}
                  </div>
                  <div className="flex justify-between text-[8px] text-slate-500 mt-1">
                    <span>{lastResult.wpmHistory[0]?.wpm||0} WPM</span>
                    <span>{lastResult.wpm?.toFixed(0)} WPM final</span>
                  </div>
                </div>
              )}

              <div className="glass-dark rounded-2xl p-3 border border-slate-700/50">
                <h3 className="text-sm font-black mb-2 flex items-center gap-1.5">🏁 Recent Races</h3>
                {recent.length===0?(
                  <p className="text-[10px] text-slate-500 text-center py-3">No races yet. Let's go!</p>
                ):(
                  <div className="space-y-1.5">
                    {recent.map(r=>{
                      const p=POKEMON.find(x=>x.id===r.pokemon)||POKEMON[0];
                      return(
                        <div key={r.id} className="flex items-center justify-between text-xs glass-dark rounded-xl px-3 py-2">
                          <span>{p.emoji}</span>
                          <span className="font-mono font-bold text-yellow-400">{r.wpm.toFixed(0)} WPM</span>
                          <span className="font-mono text-blue-300">{r.accuracy.toFixed(0)}%</span>
                          <span className="text-slate-500">{r.mode}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </section>
          </div>
        </div>
      );
    }

    function MiniStat({icon,label,value,color,pulse=false}){
      return(
        <div className="glass-dark rounded-2xl p-3 border border-slate-700/30 text-center hover:border-slate-600 transition-all">
          <div className={`text-lg mb-0.5 ${pulse?'animate-pulse':''}`}>{icon}</div>
          <div className={`text-xl font-black font-mono ${color}`}>{value}</div>
          <div className="text-[9px] text-slate-400 uppercase tracking-wider">{label}</div>
        </div>
      );
    }
    function MenuBtn({icon,label,desc,onClick}){
      return(
        <button onClick={onClick} className="glass-dark rounded-2xl p-3 border border-slate-700/30 text-left hover:border-slate-500 transition-all group active:scale-[0.96]">
          <div className="text-lg mb-0.5 group-hover:scale-110 transition-transform inline-block">{icon}</div>
          <div className="text-sm font-bold">{label}</div>
          <div className="text-[9px] text-slate-400">{desc}</div>
        </button>
      );
    }

    /* ═══════════════════ SPRITE COMPONENT ═══════════════════ */
    function SpriteImg({pokemonId, emoji, size=40, running=false, nitro=false, hover=false, color='#facc15', isPlayer=false}){
      const {sprites}=useContext(Ctx);
      const url=sprites[pokemonId];
      const [failed,setFailed]=useState(false);
      const cls=['sprite-img', running?'running':'', hover&&!running?'sprite-hover':''].filter(Boolean).join(' ');
      const glowFilter=isPlayer
        ?`drop-shadow(0 0 10px ${color}) drop-shadow(0 0 20px ${color}66) drop-shadow(0 2px 4px rgba(0,0,0,0.8))`
        :`drop-shadow(0 0 6px ${color}aa) drop-shadow(0 2px 4px rgba(0,0,0,0.8))`;
      const filterStyle=nitro
        ?`brightness(1.6) saturate(2) ${glowFilter}`
        :glowFilter;
      if(url&&!failed){
        return(
          <img src={url} alt={pokemonId} width={size} height={size}
            className={cls} style={{minWidth:size,minHeight:size,objectFit:'contain',filter:filterStyle}}
            onError={()=>setFailed(true)}/>
        );
      }
      return <span style={{fontSize:size*0.72,lineHeight:1,display:'inline-block',filter:filterStyle}}>{emoji}</span>;
    }

    /* ═══════════════════ RACE SCREEN ═══════════════════ */
    function RaceScreen({config,onFinish}){
      const {settings,player,setPlayer,races}=useContext(Ctx);
      const avgWpm=useMemo(()=>calcAvgWPM(races),[races]);
      const {passage,bots,lectureName}=config;
      const MILESTONES=[
        {n:10,  text:"Quick Attack!",   tier:1},
        {n:25,  text:"Thunderbolt! ⚡", tier:2},
        {n:50,  text:"HYPER BEAM!! 💥", tier:3},
        {n:100, text:"LEGENDARY!!! ✨", tier:4},
      ];
      const poke=POKEMON.find(p=>p.id===settings.selectedPokemon)||POKEMON[0];
      const [phase,setPhase]=useState("countdown");
      const [cd,setCd]=useState(3);
      // input state removed — replaced by word-based engine (wordIdx/wordInput)
      const [startTime,setStartTime]=useState(null);
      const [now,setNow]=useState(null);
      const [combo,setCombo]=useState(0);
      const [bestCombo,setBestCombo]=useState(0);
      const [nitroActive,setNitroActive]=useState(false);
      const [nitroCharge,setNitroCharge]=useState(player.nitroCharge||0);
      const [speedLines,setSpeedLines]=useState([]);
      const [shaking,setShaking]=useState(false);
      const [placement,setPlacement]=useState(null);
      const [nitroAttacks,setNitroAttacks]=useState([]);
      const [finishedBots,setFinishedBots]=useState(new Set());
      const [nitroBurst,setNitroBurst]=useState(false); // 300ms nitro cinematic
      const [botFinishToasts,setBotFinishToasts]=useState([]); // [{name,id}]
      const [showVictory,setShowVictory]=useState(false); // VICTORY! banner for player 1st place
      const [trackTilt,setTrackTilt]=useState(false); // perspective camera tilt at 60% progress
      const [reactions,setReactions]=useState([]); // [{id,emoji}] floating reaction stickers
      const [nitroDash,setNitroDash]=useState(false); // speeds up dashed-line scroll during nitro
      const canvasRef=useRef(null);
      const trailRef=useRef({}); // racer key → [{x,y}]
      const raceStateRef=useRef({});
      // Phase 6: passive abilities
      const hasPassive=(id)=>poke.passive===id||poke.passive==='all';
      const [typhSpinActive,setTyphSpinActive]=useState(false);
      const [typhSpinUsed,setTyphSpinUsed]=useState(false);
      const [raceNitros,setRaceNitros]=useState(0);
      const [currentWordPerfect,setCurrentWordPerfect]=useState(true);
      const [perfectWords,setPerfectWords]=useState(0);
      // Phase 3: word-by-word engine
      const [wordIdx,setWordIdx]=useState(0);
      const [wordInput,setWordInput]=useState('');
      const [completedWords,setCompletedWords]=useState([]); // [{correct:bool}]
      const [totalErrors,setTotalErrors]=useState(0);
      const [slideOffset,setSlideOffset]=useState(0);
      const [wordHadError,setWordHadError]=useState(false); // current word ever had an error this attempt
      const [flashWordIdx,setFlashWordIdx]=useState(-1); // index of word briefly flashing green on completion
      // Phase 4: HUD upgrades
      const [wpmDisplay,setWpmDisplay]=useState(0);   // WPM updated every 2s
      const [milestoneBanner,setMilestoneBanner]=useState(null); // {text,tier,confetti?}
      const [comboBounceKey,setComboBounceKey]=useState(0);       // triggers bounce anim
      const wpmRef=useRef(0);                                     // always-current WPM
      const [wpmHistory,setWpmHistory]=useState([]);              // [{t,wpm}] sampled every 5s
      const lastMilestoneRef=useRef(0);                           // avoid re-triggering
      const captureRef=useRef(null);  // hidden keyboard sink
      const passRef=useRef(null);     // passage viewport container
      const wordRefs=useRef([]);      // per-word span refs
      const prevWordInputRef=useRef(''); // for change detection in onChange
      // Polish: boost particles, overtaken badge, wpm badge pulse
      const [boostParticles,setBoostParticles]=useState([]);
      const [botBoostParticles,setBotBoostParticles]=useState([]);
      const [overtakenVisible,setOvertakenVisible]=useState(false);
      const [overtakenFading,setOvertakenFading]=useState(false);
      const [wpmBadgePulseKey,setWpmBadgePulseKey]=useState(0);
      const prevWpmRef=useRef(0);
      const prevProgressRef=useRef(0);

      // Countdown
      useEffect(()=>{
        if(phase!=="countdown")return;
        if(cd<=0){setPhase("racing");if(settings.soundOn){sfx("go");sfx("raceStart");}setTimeout(()=>captureRef.current?.focus(),50);return;}
        if(settings.soundOn)sfx("tick");
        const t=setTimeout(()=>setCd(c=>c-1),700);
        return()=>clearTimeout(t);
      },[phase,cd]);

      // Timer
      useEffect(()=>{
        if(phase!=="racing"||!startTime)return;
        const iv=setInterval(()=>setNow(Date.now()),60);
        return()=>clearInterval(iv);
      },[phase,startTime]);

      // ESC
      useEffect(()=>{
        const h=(e)=>{
          if(e.key==="Escape"){
            e.preventDefault();
            setPhase("countdown");setCd(3);
            setWordIdx(0);setWordInput('');setCompletedWords([]);setTotalErrors(0);setSlideOffset(0);setWordHadError(false);
            prevWordInputRef.current='';
            setWpmDisplay(0);setMilestoneBanner(null);lastMilestoneRef.current=0;
            setStartTime(null);setNow(null);setCombo(0);setBestCombo(0);
            setNitroActive(false);setPlacement(null);setFinishedBots(new Set());
            setTyphSpinActive(false);setTyphSpinUsed(false);setRaceNitros(0);
            setCurrentWordPerfect(true);setPerfectWords(0);
          }
        };
        window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
      },[]);

      // WPM display: refresh every 2 seconds during race
      useEffect(()=>{
        if(phase!=='racing'){if(phase==='countdown')setWpmDisplay(0);return;}
        const t=setInterval(()=>{
          const v=wpmRef.current;
          const wpm=isFinite(v)&&!isNaN(v)?Math.round(v):0;
          setWpmDisplay(wpm);
          setWpmHistory(h=>[...h,{t:Date.now(),wpm}]);
          // Pulse badge when WPM changes meaningfully
          if(Math.abs(wpm-prevWpmRef.current)>=2){setWpmBadgePulseKey(k=>k+1);prevWpmRef.current=wpm;}
        },1000);
        return()=>clearInterval(t);
      },[phase]);

      // Boost particles — player diamond trail every 400ms, bot dots every 600ms
      useEffect(()=>{
        if(phase!=='racing'||!startTime)return;
        const iv=setInterval(()=>{
          const st=raceStateRef.current;
          if(!st.progress)return;
          const id=Date.now()+Math.random();
          setBoostParticles(p=>[...p,{id,frac:st.progress}]);
          setTimeout(()=>setBoostParticles(p=>p.filter(x=>x.id!==id)),650);
        },400);
        return()=>clearInterval(iv);
      },[phase,startTime]);

      useEffect(()=>{
        if(phase!=='racing'||!startTime)return;
        const iv=setInterval(()=>{
          const st=raceStateRef.current;
          if(!st.botStates)return;
          const id=Date.now()+Math.random();
          const bots=(st.botStates||[]).map((b,i)=>({id:id+i,frac:b.fraction,laneIdx:i,color:typeProgressColor(b.type)}));
          setBotBoostParticles(p=>[...p,...bots]);
          setTimeout(()=>setBotBoostParticles(p=>p.filter(x=>x.id!==id&&!bots.find(b=>b.id===x.id))),700);
        },600);
        return()=>clearInterval(iv);
      },[phase,startTime]);

      // Overtaken warning — flash when any bot passes player
      useEffect(()=>{
        if(phase!=='racing')return;
        const st=raceStateRef.current;
        const playerProg=st.progress||0;
        const bots=st.botStates||[];
        const wasOvertaken=bots.some(b=>b.fraction>playerProg+0.02);
        if(wasOvertaken&&!overtakenVisible&&playerProg>0.05){
          setOvertakenVisible(true);setOvertakenFading(false);
          setTimeout(()=>{setOvertakenFading(true);setTimeout(()=>{setOvertakenVisible(false);setOvertakenFading(false);},400);},1500);
        }
      },[botStates,progress]);

      // Combo milestone banners
      useEffect(()=>{
        if(combo===0){lastMilestoneRef.current=0;return;}
        const hit=MILESTONES.slice().reverse().find(m=>combo>=m.n&&lastMilestoneRef.current<m.n);
        if(!hit)return;
        lastMilestoneRef.current=hit.n;
        const confetti=hit.tier>=4
          ?Array.from({length:16},(_,i)=>({id:i,left:Math.random()*100,delay:Math.random()*0.5,
              color:['#ef4444','#f97316','#facc15','#4ade80','#60a5fa','#c084fc'][i%6],
              dur:0.9+Math.random()*0.7}))
          :null;
        if(hit.tier>=3){setShaking(true);setTimeout(()=>setShaking(false),500);}
        setMilestoneBanner({...hit,confetti});
        const t=setTimeout(()=>setMilestoneBanner(null),1700);
        return()=>clearTimeout(t);
      },[combo]);

      // Slide viewport when word advances
      useEffect(()=>{
        const el=wordRefs.current[wordIdx];
        if(!el||!passRef.current)return;
        const lineH=passRef.current.offsetHeight/3; // 3-line window
        const target=Math.max(0,el.offsetTop-lineH);
        setSlideOffset(target);
      },[wordIdx]);

      // Focus capture on mount and when phase changes to racing
      useEffect(()=>{
        if(phase==='racing')setTimeout(()=>{
          if(captureRef.current){
            captureRef.current.focus({preventScroll:true});
          }
        },50);
      },[phase]);

      // Camera tilt at 60% progress
      useEffect(()=>{
        if(progress>=0.6&&!trackTilt)setTrackTilt(true);
        else if(progress<0.5&&trackTilt)setTrackTilt(false);
      },[progress]);

      // Canvas trail — persistent animated boost trails for all racers
      useEffect(()=>{
        if(phase!=='racing'&&phase!=='finished')return;
        let animId;
        const drawTrail=(ctx2d,points,color)=>{
          if(points.length<1)return;
          points.forEach((pt,i)=>{
            const frac=points.length>1?i/(points.length-1):1;
            const radius=1+frac*4; // 1px at tail → 5px at head
            const alpha=Math.round(frac*0.7*255).toString(16).padStart(2,'0');
            ctx2d.beginPath();
            ctx2d.arc(pt.x,pt.y,radius,0,Math.PI*2);
            ctx2d.fillStyle=color+alpha;
            ctx2d.fill();
          });
        };
        const frame=()=>{
          const canvas=canvasRef.current;
          if(!canvas){animId=requestAnimationFrame(frame);return;}
          const par=canvas.parentElement;
          if(!par){animId=requestAnimationFrame(frame);return;}
          const W=par.offsetWidth,H=par.offsetHeight;
          if(canvas.width!==W)canvas.width=W;
          if(canvas.height!==H)canvas.height=H;
          const ctx2d=canvas.getContext('2d');
          ctx2d.clearRect(0,0,W,H);
          const st=raceStateRef.current;
          const TL=4,FW=20,TW=W-TL-FW;
          const PAD=4,PLH=90,SEP=1,BTH=90;
          const racers=[
            {key:'player',frac:st.progress||0,color:st.poke?.color||'#facc15',y:PAD+PLH/2},
            ...(st.botStates||[]).map((b,i)=>({
              key:b.name,frac:b.fraction,color:typeProgressColor(b.type),
              y:PAD+PLH+SEP+BTH*i+BTH/2
            }))
          ];
          racers.forEach(r=>{
            const x=TL+r.frac*TW*0.88;
            if(!trailRef.current[r.key])trailRef.current[r.key]=[];
            const hist=trailRef.current[r.key];
            const last=hist[hist.length-1];
            if(!last||Math.abs(last.x-x)>0.3){
              hist.push({x,y:r.y});
              if(hist.length>20)hist.shift();
            }
            drawTrail(ctx2d,hist,r.color);
          });
          animId=requestAnimationFrame(frame);
        };
        animId=requestAnimationFrame(frame);
        return()=>{cancelAnimationFrame(animId);trailRef.current={};};
      },[phase]);

      // Speed lines effect
      const addSpeedLine=()=>{
        const id=Date.now()+Math.random();
        const line={id,top:Math.random()*80+10,color:poke.color};
        setSpeedLines(p=>[...p,line]);
        setTimeout(()=>setSpeedLines(p=>p.filter(l=>l.id!==id)),500);
      };

      // Continuous speed lines while typing above avg WPM
      useEffect(()=>{
        if(phase!=='racing'||!startTime)return;
        const col=poke.color;
        const spawnLine=()=>{
          const id=Date.now()+Math.random();
          const w=50+Math.random()*80; // vary length 50–130px
          setSpeedLines(p=>[...p,{id,top:Math.random()*80+10,color:col,w}]);
          setTimeout(()=>setSpeedLines(p=>p.filter(l=>l.id!==id)),500);
        };
        const iv=setInterval(()=>{
          const wpm=wpmRef.current;
          if(wpm>avgWpm*0.85){
            spawnLine();
            if(wpm>avgWpm*1.15)setTimeout(spawnLine,130);
            if(wpm>avgWpm*1.4)setTimeout(spawnLine,270);
          }
        },360);
        return()=>clearInterval(iv);
      },[phase,startTime,avgWpm]);

      // Try to advance to next word (called on Space press, or with inputOverride for auto-advance)
      const tryAdvanceWord=useCallback((inputOverride=undefined)=>{
        if(!currentWord)return;
        const normalizeStr=s=>[...s].map(normalizeChar).join('');
        const inp=inputOverride!==undefined?inputOverride:wordInput;
        const isCorrect=normalizeStr(inp)===normalizeStr(currentWord);
        if(!isCorrect){
          // Block advancement — shake and error sound
          setShaking(true);setTimeout(()=>setShaking(false),350);
          if(settings.soundOn)sfx('err');
          return;
        }
        // ✓ Word correct — advance
        if(settings.soundOn)sfx('wordDone');
        setFlashWordIdx(wordIdx);
        setTimeout(()=>setFlashWordIdx(-1),180);
        const newCompleted=[...completedWords,{correct:true}];
        setCompletedWords(newCompleted);
        // Espeon: count perfectly typed words (no errors during typing)
        if(currentWordPerfect)setPerfectWords(p=>p+1);
        setCurrentWordPerfect(true); // reset for next word
        setWordHadError(false);
        const next=wordIdx+1;
        setWordIdx(next);
        setWordInput('');
        prevWordInputRef.current='';
        // Word completion nitro boost (Jolteon: 50% more)
        const wordNitroGain=currentWord.length*0.4*(hasPassive('fast_nitro')?1.5:1);
        setNitroCharge(p=>Math.min(100,p+wordNitroGain));
        // Speed line burst on every 3rd word
        if(next%3===0)addSpeedLine();
      },[wordInput,currentWord,completedWords,wordIdx,settings.soundOn]);

      // Handle keydown — intercept Space/Backspace, let other keys through to onChange
      const handleKeyDown=useCallback((e)=>{
        if(phase!=='racing')return;
        if(e.key==='Tab'||e.key==='Escape')return; // handled elsewhere
        if(!startTime&&e.key.length===1){const t=Date.now();setStartTime(t);setNow(t);}
        if(e.key===' '||e.key==='Enter'){
          e.preventDefault();
          tryAdvanceWord();
          return;
        }
        // Let other keys flow through to onChange
      },[phase,startTime,tryAdvanceWord]);

      // Handle onChange — process added/removed chars
      const handleChange=useCallback((e)=>{
        if(phase!=='racing')return;
        const newVal=e.target.value;
        const prev=prevWordInputRef.current;
        if(!startTime&&newVal.length>0){const t=Date.now();setStartTime(t);setNow(t);}
        // Detect if a space was entered (mobile fallback for word advance)
        if(newVal.endsWith(' ')||newVal.endsWith('\n')){
          const cleaned=newVal.trimEnd();
          e.target.value=cleaned;
          prevWordInputRef.current=cleaned;
          setWordInput(cleaned);
          tryAdvanceWord();
          return;
        }
        // Character added
        if(newVal.length>prev.length){
          const addedChar=newVal[newVal.length-1];
          const charIdx=prev.length;
          const expected=currentWord[charIdx];
          if(expected&&normalizeChar(addedChar)===normalizeChar(expected)){
            const nc=combo+1;setCombo(nc);
            if(nc>bestCombo)setBestCombo(nc);
            if(nc>0&&nc%10===0&&settings.soundOn)sfx('combo');
            if(settings.soundOn)sfx('key');
            // Jolteon: 50% faster nitro charge
            const nitroGain=hasPassive('fast_nitro')?2.25:1.5;
            setNitroCharge(p=>Math.min(100,p+nitroGain));
            setComboBounceKey(p=>p+1);
            // Charizard: speed surge at every 10th combo
            if(hasPassive('combo_surge')&&nc%10===0){setNitroActive(true);setTimeout(()=>setNitroActive(false),1500);addSpeedLine();}
            if(nc%5===0)addSpeedLine();
          }else{
            // Alakazam: errors never reset combo
            // Blastoise: errors don't reset combo when accuracy >= 90%
            const skipReset=hasPassive('no_combo_reset')||(hasPassive('combo_tank')&&accuracy>=90);
            if(!skipReset)setCombo(0);
            if(settings.soundOn)sfx('err');
            setShaking(true);setTimeout(()=>setShaking(false),300);
            setTotalErrors(p=>p+1);
            setWordHadError(true);
            setCurrentWordPerfect(false);
          }
        }
        setWordInput(newVal);
        prevWordInputRef.current=newVal;
        // Auto-finish: last word fully typed correctly → advance without Space
        if(words.length>0&&wordIdx===words.length-1&&newVal.length===currentWord.length&&newVal.length>0){
          const normalizeStr=s=>[...s].map(normalizeChar).join('');
          if(normalizeStr(newVal)===normalizeStr(currentWord))tryAdvanceWord(newVal);
        }
      },[phase,startTime,combo,bestCombo,currentWord,settings.soundOn,tryAdvanceWord,wordIdx,words]);

      // Nitro boost: press Tab
      const launchNitroAttack=useCallback(()=>{
        const id=Date.now();
        const cls=nitroTypeClass(poke.type);
        setNitroAttacks(p=>[...p,{id,cls}]);
        setTimeout(()=>setNitroAttacks(p=>p.filter(a=>a.id!==id)),700);
      },[poke.type]);

      useEffect(()=>{
        const h=(e)=>{
          if(e.key==="Tab"&&phase==="racing"&&nitroCharge>=50){
            e.preventDefault();
            setNitroCharge(p=>p-50);
            setPlayer(p=>({...p,nitroUses:(p.nitroUses||0)+1}));
            setRaceNitros(p=>p+1);
            if(settings.soundOn)sfx("nitro");
            setNitroBurst(true);setTimeout(()=>setNitroBurst(false),300);
            setNitroDash(true);setTimeout(()=>setNitroDash(false),800);
            for(let i=0;i<6;i++)setTimeout(()=>addSpeedLine(),i*55);
            for(let i=0;i<3;i++)setTimeout(()=>launchNitroAttack(),i*120);
            if(hasPassive('fire_spin')&&!typhSpinUsed){
              // Typhlosion: Fire Spin — 5s 30% mega-boost, single use per race
              setTyphSpinUsed(true);setTyphSpinActive(true);
              setTimeout(()=>setTyphSpinActive(false),5000);
            }else{
              setNitroActive(true);
              setTimeout(()=>setNitroActive(false),3000);
            }
            // Skip ahead by one word (like NitroType)
            setWordIdx(p=>p+1);
            setWordInput('');
            prevWordInputRef.current='';
            setCompletedWords(p=>[...p,{correct:true}]);
          }
        };
        window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
      },[phase,nitroCharge,settings.soundOn,launchNitroAttack]);

      // Word list — derived from passage once
      const words=useMemo(()=>passage.trim().split(/\s+/).filter(Boolean),[passage]);
      const currentWord=words[wordIdx]||'';
      const totalC=passage.length;

      // Chars in completed words (+1 for the space after each word)
      const completedCharsTotal=completedWords.reduce((s,_,i)=>s+(words[i]?.length||0)+1,0);
      const completedCorrectChars=completedWords.reduce((s,w,i)=>w.correct?s+(words[i]?.length||0)+1:s,0);
      // Correct chars typed in the current in-progress word
      const currentWordCorrect=[...wordInput].filter((c,i)=>i<currentWord.length&&normalizeChar(c)===normalizeChar(currentWord[i])).length;

      const correctC=completedCorrectChars+currentWordCorrect;
      const typedC=completedCharsTotal+wordInput.length;
      const elMs=startTime&&now?Math.max(now-startTime,1):1;
      const elMin=elMs/60000;
      const dragoniteBoost=hasPassive('sprint')&&progress>=0.8?1.25:1;
      const typhBoost=typhSpinActive?1.3:1;
      const nitroBoost=(nitroActive||typhSpinActive)?1.15:1;
      const pokeSpeed=poke.speed*nitroBoost*dragoniteBoost*typhBoost;
      const rawWpm=correctC>0&&elMin>0?(correctC/5)/elMin:0;
      const displayWpm=isFinite(rawWpm)&&!isNaN(rawWpm)?rawWpm:0;
      wpmRef.current=displayWpm; // keep ref current for 2s interval (must be AFTER displayWpm is computed)
      const accuracy=typedC>0?(correctC/typedC)*100:100;
      const progress=totalC?Math.min(1,typedC/totalC):0;
      const elSec=elMs/1000;

      // Does the current word have a typing error right now?
      const currentWordHasError=wordInput.length>0&&(
        wordInput.length>currentWord.length||
        [...wordInput].some((c,i)=>normalizeChar(c)!==normalizeChar(currentWord[i]||''))
      );

      // Bot states
      const botStates=bots.map(bot=>{
        const cps=(bot.wpm*5)/60;
        const f=Math.min(1,(cps*elSec)/totalC);
        return{...bot,fraction:f};
      });
      // Keep raceStateRef current for canvas rAF loop (must be after progress + botStates are defined)
      raceStateRef.current={progress,botStates,poke,phase};

      // Track bots as they cross the finish line — show toast
      useEffect(()=>{
        if(phase!=='racing')return;
        botStates.forEach(bot=>{
          if(bot.fraction>=1&&!finishedBots.has(bot.name)){
            setFinishedBots(p=>new Set([...p,bot.name]));
            const toastId=Date.now()+Math.random();
            setBotFinishToasts(p=>[...p,{name:bot.name,id:toastId,color:typeProgressColor(bot.type)}]);
            setTimeout(()=>setBotFinishToasts(p=>p.filter(t=>t.id!==toastId)),2200);
          }
        });
      },[botStates,phase]);

      // Finish — triggered when all words have been completed
      useEffect(()=>{
        if(phase==="racing"&&wordIdx>=words.length&&words.length>0&&startTime){
          setPhase("finished");
          const botsAhead=botStates.filter(b=>b.fraction>=1).length;
          const finalPlacement=botsAhead+1;
          setPlacement(finalPlacement);
          if(finalPlacement===1){
            setShowVictory(true);
            setTimeout(()=>setShowVictory(false),2000);
          }
          setTimeout(()=>onFinish({wpm:displayWpm,accuracy,timeSec:elSec,bestCombo,placement:finalPlacement,
            totalErrors,raceNitros,fireSpinUsed:typhSpinUsed,perfectWords,wpmHistory}),500);
        }
      },[wordIdx,words.length,phase,startTime]);

      // COUNTDOWN — dramatic full-screen overlay
      if(phase==="countdown"){
        const isGo=cd<=0;
        // Compute 3 longest words for hard-word warning
        const passageWordList=passage.trim().split(/\s+/).filter(Boolean);
        const hardWords=[...passageWordList]
          .map(w=>w.replace(/[^a-zA-Z']/g,''))
          .filter(w=>w.length>4)
          .sort((a,b)=>b.length-a.length)
          .filter((w,i,arr)=>arr.indexOf(w)===i)
          .slice(0,3);
        return(
          <div style={{position:'relative',minHeight:380}}>
            {/* Background pulse overlay — type color flash each tick */}
            <div style={{
              position:'absolute',inset:0,borderRadius:'1rem',pointerEvents:'none',zIndex:1,
              background:poke.color,
              animation:'cdBgPulse 0.7s ease-in-out',
              animationFillMode:'both',
            }} key={'cdpulse'+cd}/>
            {/* Mini track preview */}
            <div className="w-full race-arena rounded-2xl overflow-hidden opacity-30 pointer-events-none" style={{position:'relative',zIndex:2}}>
              <div style={{padding:'8px 16px'}}>
                {[{poke,isPlayer:true,frac:0},...bots.map(b=>({poke:b,isPlayer:false,frac:0}))].map((r,i)=>(
                  <div key={i} className="race-lane" style={{height:36}}>
                    <div className="lane-track-inner">
                      <div className="lane-start-line"/>
                      <div className="lane-finish-flag"/>
                      <div style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)'}}>
                        <SpriteImg pokemonId={r.poke.id} emoji={r.poke.emoji} size={28}/>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            {/* Slam-in number */}
            <div className="flex flex-col items-center justify-center" style={{position:'absolute',inset:0,zIndex:10}}>
              <div key={cd} style={{
                fontFamily:"'Fredoka One',sans-serif",
                fontSize: isGo?'7rem':'8rem',
                fontWeight:900,lineHeight:1,
                color: isGo?'#facc15':poke.color,
                textShadow: `0 0 40px ${isGo?'#facc15':poke.color}, 0 0 80px ${isGo?'#facc15':poke.color}88`,
                animation: isGo?'cdGo 0.6s ease-out forwards':'cdSlam 0.35s cubic-bezier(0.22,1,0.36,1) forwards',
              }}>
                {isGo?'GO!':cd}
              </div>
              {!isGo&&(
                <p className="mt-6 text-sm font-bold" style={{color:'var(--text-muted)'}}>Get ready, {poke.name}!</p>
              )}
              {!isGo&&hardWords.length>0&&(
                <div className="mt-3 px-4 py-2 rounded-xl" style={{background:'rgba(0,0,0,0.5)',border:`1px solid ${poke.color}44`}}>
                  <div className="text-[9px] font-bold mb-1.5" style={{color:poke.color,textTransform:'uppercase',letterSpacing:'0.08em'}}>Watch out for these words:</div>
                  <div className="flex gap-2 flex-wrap justify-center">
                    {hardWords.map((w,i)=>(
                      <span key={i} className="text-xs font-mono font-bold px-2 py-0.5 rounded" style={{background:`${poke.color}22`,color:'#f0f4ff'}}>{w}</span>
                    ))}
                  </div>
                </div>
              )}
              <p className="mt-3 text-[10px] font-ui" style={{color:'var(--text-muted)'}}>ESC restart · TAB nitro boost</p>
            </div>
          </div>
        );
      }

      return(
        <div className={`space-y-3 animate-fade ${shaking?"animate-shake":""}`}>
          {/* VICTORY! banner */}
          {showVictory&&(
            <div className="victory-banner">
              <div style={{
                fontFamily:"'Fredoka One',sans-serif",fontSize:'3.5rem',fontWeight:900,
                background:'linear-gradient(135deg,#facc15,#f97316,#ef4444)',
                WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',
                textShadow:'none',filter:'drop-shadow(0 0 20px rgba(250,204,21,0.8))',
                padding:'8px 24px',borderRadius:'16px',
                backgroundColor:'rgba(0,0,0,0.85)',
                WebkitTextFillColor:'unset',
                background:'rgba(0,0,0,0.85)',
                border:'2px solid #facc15',
                color:'#facc15',
              }}>🏆 VICTORY! 🏆</div>
            </div>
          )}
          {/* ═══ RACE ARENA — top-down road ═══ */}
          <div className="race-arena-tilt-wrap rounded-2xl overflow-hidden" style={{perspective:trackTilt?'800px':undefined}}>
          <div className="race-arena race-arena-road rounded-2xl overflow-hidden" style={{
            position:'relative',
            boxShadow:nitroBurst?`0 0 40px ${poke.color}, 0 0 80px ${poke.color}66`:'none',
            transition:'box-shadow 0.3s, transform 1s ease',
            transform:trackTilt?'rotateX(3deg)':'rotateX(0deg)',
          }}>
            {/* Arena-top race progress bar */}
            <div className="arena-top-bar">
              <div className="arena-top-fill" style={{
                width:`${progress*100}%`,
                background:`linear-gradient(90deg,${poke.color}66,${poke.color})`,
                boxShadow:`0 0 8px ${poke.color}`,
              }}/>
            </div>

            {/* Nitro active: type-tinted arena overlay */}
            {(nitroActive||typhSpinActive)&&(
              <div className="nitro-arena-tint" style={{background:typhSpinActive?'#ea580c':poke.color}}/>

            {/* Arena header — scoreboard */}
            <div className="arena-scoreboard px-4 py-2 flex items-center justify-between gap-3" style={{position:'relative',zIndex:5}}>

                <span className="text-sm font-ui" style={{color:'rgba(255,255,255,0.5)'}}>⬛⬛</span>
                <span className="text-xs font-ui font-bold" style={{color:'var(--accent-primary)'}}>RACE</span>
                <span className="text-xs font-ui" style={{color:'var(--text-muted)'}}>{elSec.toFixed(1)}s</span>
                {nitroActive&&!typhSpinActive&&<span className="text-xs font-black animate-pulse" style={{color:poke.color}}>⚡ NITRO!</span>}
                {typhSpinActive&&<span className="text-xs font-black animate-pulse" style={{color:'#ea580c'}}>🌋 FIRE SPIN!</span>}
                {hasPassive('sprint')&&progress>=0.8&&<span className="text-[10px] font-bold" style={{color:'#fb923c'}}>🐲 SPRINT!</span>}
              </div>
              {/* Center: player progress bar */}
              <div className="flex-1 flex items-center gap-2 min-w-0">
                <div className="scoreboard-progress-bar">
                  <div className="scoreboard-progress-fill" style={{
                    width:`${progress*100}%`,
                    background:`linear-gradient(90deg,${poke.color}88,${poke.color})`,
                    boxShadow:`0 0 6px ${poke.color}`,

                </div>
                <span className="text-[10px] font-ui flex-shrink-0" style={{color:poke.color,minWidth:28}}>{(progress*100).toFixed(0)}%</span>
              </div>
              {/* Right: WPM readout */}
              <div className="flex items-center gap-1 flex-shrink-0">
                <span key={wpmDisplay} style={{
                  fontFamily:"'Fredoka One',sans-serif",fontSize:'1.6rem',fontWeight:900,lineHeight:1,
                  color: wpmDisplay>=100?'#ef4444':wpmDisplay>=80?'#f97316':wpmDisplay>=60?'#facc15':'var(--text-bright)',
                  textShadow: wpmDisplay>=60?`0 0 14px currentColor`:'none',
                  animation:wpmDisplay>0?'wpmPop 0.3s ease-out both':undefined,
                }}>{wpmDisplay}</span>
                <span className="text-[9px] font-ui" style={{color:'var(--text-muted)'}}>WPM</span>
              </div>
            </div>

            {/* ── Crowd strip (spectators at top) ── */}
            <div className="road-crowd">
              <svg width="100%" height="28" viewBox="0 0 400 28" preserveAspectRatio="xMidYMid slice" style={{position:'absolute',inset:0}}>
                {Array.from({length:50}).map((_,i)=>{
                  const x=i*8+4;
                  const c=['#f97316','#3b82f6','#22c55e','#ec4899','#facc15','#a855f7'][i%6];
                  const h=14+(i%3)*4;
                  const bobStyle=i%3===0?{animation:`crowdBob ${0.8+(Math.floor(i/3)%3)*0.15}s ease-in-out ${(Math.floor(i/3)%3)*0.3}s infinite`}:{};
                  return <g key={i} fill={c} opacity={0.45+(i%4)*0.1} style={bobStyle}>
                    <ellipse cx={x} cy={8} rx={3} ry={4}/>
                    <rect x={x-3} y={12} width={6} height={h} rx={2}/>
                  </g>;
                })}
              </svg>
              <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,rgba(0,0,0,0.3),rgba(0,0,0,0.6))'}}/>
            </div>

            {/* ── Top grass strip with pixel-art trees ── */}
            <div className="road-grass">
              {Array.from({length:8}).map((_,i)=>{
                const h=14+(i%4)*3; // 14–22px height variation
                const w=Math.round(h*0.85);
                return(
                  <div key={i} style={{position:'absolute',left:`${4+i*13}%`,top:0,pointerEvents:'none',opacity:0.88+(i%3)*0.04}}>
                    <svg width={w} height={h+7} viewBox={`0 0 ${w} ${h+7}`} fill="none">
                      {/* Triangle crown */}
                      <polygon points={`${w/2},0 ${w},${h} 0,${h}`} fill={i%3===0?'#15803d':i%3===1?'#166534':'#14532d'} opacity="0.97"/>
                      <polygon points={`${w/2},2 ${w-2},${h} 2,${h}`} fill={i%2===0?'#16a34a':'#166534'} opacity="0.6"/>
                      {/* Stem */}
                      <rect x={Math.round(w/2)-2} y={h} width={4} height={7} rx="1" fill="#78350f" opacity="0.92"/>
                    </svg>
                  </div>
                );
              })}
              {Array.from({length:10}).map((_,i)=>(
                <span key={'d'+i} style={{
                  position:'absolute',left:`${(i*9+5)%95}%`,top:`${3+(i*4)%20}px`,
                  color:['#f97316','#ef4444','#fb923c'][i%3],
                  fontSize:'5px',pointerEvents:'none',opacity:0.7,
                }}>✦</span>
              ))}
            </div>

            {/* ── Lanes — asphalt road ── */}
            <div style={{padding:'4px 0 4px',position:'relative',zIndex:5}}>
              {/* Canvas trail overlay — persistent boost trails */}
              <canvas ref={canvasRef} style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:6,width:'100%',height:'100%'}}/>

              {/* Falling leaves across the track — tumbling autumn leaves */}
              {Array.from({length:16}).map((_,i)=>{
                const chars=['❋','✦','✿','❋','✦'];
                const colors=['#f97316','#facc15','#ef4444','#22c55e','#f97316','#fb923c'];
                return(
                  <div key={i} className="falling-leaf" style={{
                    top:`${8+(i*5.7)%80}%`,
                    animationDuration:`${10+(i*1.37)%11}s`,
                    animationDelay:`${-(i*2.1)%18}s`,
                    color:colors[i%6],fontSize:`${6+(i%3)}px`,
                  }}>{chars[i%5]}</div>
                );
              })}

              {/* ── Player lane ── */}
              <div className={`race-lane lane-player ${phase==='finished'?'lane-finished':''}`}
                style={{
                  height:90,
                  borderLeft:`4px solid ${poke.color}`,
                  boxShadow:`inset 4px 0 12px ${poke.color}44`,
                  background:`linear-gradient(90deg,${poke.color}0f,transparent 40%), repeating-linear-gradient(180deg,transparent 0px,transparent 18px,rgba(255,255,255,0.018) 19px,transparent 20px), #1e1a2e`,
                }}>
                <div className="lane-track-inner">
                  <div className="lane-road-dash" style={{animationDuration:nitroDash?'0.5s':'1.2s'}}/>
                  {/* Start line with label */}
                  <div className="lane-start-line"/>
                  <div className="lane-start-label">START</div>
                  <div className="lane-finish-flag"/>
                  {/* Nitro burst lane flash */}
                  {nitroBurst&&<div className="nitro-lane-burst" style={{background:`linear-gradient(90deg,transparent,${poke.color}66,${poke.color}dd,${poke.color}66,transparent)`}}/>}
                  {/* Overtaken warning */}
                  {overtakenVisible&&(
                    <div className={`overtaken-badge${overtakenFading?' fading':''}`}>⚠ OVERTAKEN</div>
                  )}
                  {/* Player WPM HUD badge */}
                  <div key={wpmBadgePulseKey} className="racer-wpm-badge" style={{
                    left:`calc(${progress*88}% + 2px)`,
                    background:`${poke.color}4d`,
                    border:`1px solid ${poke.color}`,
                    color:'#fff',fontSize:13,fontWeight:900,
                    animation:wpmBadgePulseKey>0?'wpmBadgePulse 0.3s ease-out':undefined,
                  }}>
                    <span style={{color:poke.color,fontFamily:"'Fredoka One',sans-serif",fontSize:18}}>{wpmDisplay}</span>
                    <span style={{fontSize:8,opacity:0.8,marginLeft:3,fontFamily:'Space Mono,monospace'}}>YOU</span>
                  </div>
                  {/* Sprite racer */}
                  <div className={`pokemon-racer ${nitroBurst?'sprite-nitro-burst':''}`} style={{
                    left:`calc(${progress*88}% + 2px)`,zIndex:5,
                    transform:`translateY(-50%) ${nitroBurst?'scale(1.3)':'scale(1)'}`,
                    transition:'transform 0.3s ease-out',
                  }}>
                    <div className="sprite-shadow-disc" style={{opacity:nitroActive?0.9:0.6}}/>
                    <SpriteImg pokemonId={poke.id} emoji={poke.emoji} size={80} running={!!startTime} nitro={nitroActive} color={poke.color} isPlayer={true}/>
                    {nitroActive&&<span style={{position:'absolute',right:-14,top:'50%',transform:'translateY(-50%)',fontSize:14}}>💨</span>}
                  </div>
                  {/* Boost particles — player diamonds */}
                  {boostParticles.map(p=>(
                    <div key={p.id} className="boost-particle" style={{
                      left:`calc(${p.frac*88}% - 10px)`,top:'50%',marginTop:-4,
                      color:poke.color,fontSize:8,
                    }}>◆</div>
                  ))}
                  {/* Nitro attack effects */}
                  {nitroAttacks.map(a=>(
                    <div key={a.id} className={`nitro-attack ${a.cls}`}
                      style={{left:`calc(${progress*88}% + 62px)`}}/>
                  ))}
                  {/* Speed lines */}
                  {speedLines.map(l=>(
                    <div key={l.id} className="speed-line" style={{
                      top:`${l.top}%`,
                      left:`calc(${progress*88}% - ${l.w||80}px)`,
                      width:l.w||80,
                      background:`linear-gradient(90deg,transparent,${l.color}99,${l.color}44)`,
                    }}/>
                  ))}
                  {/* Progress trail */}
                  <div className="lane-progress-bar">
                    <div className="lane-progress-fill" style={{
                      width:`${progress*100}%`,
                      background:`linear-gradient(90deg,transparent,${poke.color}44 30%,${poke.color}dd)`,
                      boxShadow:`0 0 8px ${poke.color}88,0 0 3px ${poke.color}`,
                    }}/>
                  </div>
                  {phase==='finished'&&<div className="finish-badge" style={{background:poke.color,color:'#000'}}>FINISH!</div>}
                </div>
              </div>

              {/* ── Bot lanes ── */}
              {botStates.map((bot,bIdx)=>{
                const botFinished=finishedBots.has(bot.name)||bot.fraction>=1;
                const fillColor=typeProgressColor(bot.type);
                const nextBot=botStates[bIdx+1];
                const nextColor=nextBot?typeProgressColor(nextBot.type):fillColor;
                return(
                  <React.Fragment key={bot.name}>
                    {/* Lane divider with type-color gradient */}
                    <div className="lane-divider" style={{background:`linear-gradient(90deg,${fillColor}44 0%,transparent 30%,transparent 70%,${nextColor}44 100%)`}}/>
                    <div className={`race-lane ${botFinished?'lane-finished':''}`} style={{height:90,borderLeft:`3px solid ${fillColor}99`,boxShadow:`inset 0 -2px 8px ${fillColor}33`}}>
                      <div className="lane-track-inner">
                        <div className="lane-road-dash"/>
                        {/* Start line with label */}
                        <div className="lane-start-line"/>
                        <div className="lane-start-label">START</div>
                        <div className="lane-finish-flag"/>
                        {/* Badge */}
                        <div className="racer-badge" style={{left:`calc(${bot.fraction*88}% + 2px)`,color:fillColor,border:`1px solid ${fillColor}44`,fontSize:6}}>
                          {bot.name.slice(0,10)}
                        </div>
                        {/* Sprite */}
                        <div className="pokemon-racer" style={{left:`calc(${bot.fraction*88}% + 2px)`,zIndex:5}}>
                          <div className="sprite-shadow-disc" style={{opacity:0.5}}/>
                          <SpriteImg pokemonId={bot.id} emoji={bot.emoji} size={80} running={!!startTime&&bot.fraction<1} color={fillColor}/>
                        </div>
                        {/* Bot boost particles */}
                        {botBoostParticles.filter(p=>p.laneIdx===bIdx).map(p=>(
                          <div key={p.id} className="boost-particle" style={{
                            left:`calc(${p.frac*88}% - 8px)`,top:'50%',marginTop:-3,
                            color:p.color,fontSize:5,

                        ))}
                        <div className="lane-progress-bar">
                          <div className="lane-progress-fill" style={{
                            width:`${bot.fraction*100}%`,
                            background:`linear-gradient(90deg,transparent,${fillColor}44 30%,${fillColor}bb)`,
                            boxShadow:`0 0 6px ${fillColor}66`,
                          }}/>
                        </div>
                        {botFinished&&<div className="finish-badge" style={{background:fillColor,color:'#000',fontSize:8}}>FINISH!</div>}
                        {/* Bot finish toast */}
                        {botFinishToasts.filter(t=>t.name===bot.name).map(t=>(
                          <div key={t.id} style={{
                            position:'absolute',top:-26,left:'50%',transform:'translateX(-50%)',
                            background:t.color,color:'#000',fontSize:9,fontWeight:900,

                  </React.Fragment>

            </div>

            {/* ── Bottom grass strip with pixel-art trees ── */}
            <div className="road-grass-bottom">
              {Array.from({length:8}).map((_,i)=>{

                return(
                  <div key={i} style={{position:'absolute',left:`${6+i*12+i%3*3}%`,bottom:0,pointerEvents:'none',opacity:0.85+(i%3)*0.05}}>
                    <svg width={w} height={h+7} viewBox={`0 0 ${w} ${h+7}`} fill="none">
                      <polygon points={`${w/2},0 ${w},${h} 0,${h}`} fill={i%3===0?'#166534':i%3===1?'#14532d':'#15803d'} opacity="0.95"/>

                  const id=Date.now()+Math.random();

            {reactions.map(r=>(

            <>
              <div className={`milestone-banner milestone-t${milestoneBanner.tier}`}>
