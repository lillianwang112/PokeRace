<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PokéRace — Typing Race Adventure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PokéRace: A Pokémon-themed typing race game. Study any subject while racing Pokémon!" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167x167.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120x120.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PokéRace" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="PokéRace" />
  <meta name="msapplication-TileColor" content="#1a1a2e" />
  <meta name="msapplication-TileImage" content="icons/icon-144x144.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans:['Nunito','system-ui','sans-serif'], mono:['JetBrains Mono','monospace'], display:['Fredoka One','sans-serif'], ui:['Space Mono','monospace'] },
          colors: {
            pokered: { 50:'#fef2f2', 100:'#fee2e2', 200:'#fecaca', 300:'#fca5a5', 400:'#f87171', 500:'#ef4444', 600:'#dc2626', 700:'#b91c1c', 800:'#991b1b', 900:'#7f1d1d' },
            pokeblue: { 50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93c5fd', 400:'#60a5fa', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 800:'#1e3a5f', 900:'#1a1a2e' },
            pokeyellow: { 400:'#facc15', 500:'#eab308', 600:'#ca8a04' },
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Fredoka+One&family=Nunito:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════ CSS DESIGN SYSTEM ═══════════════════ */
    :root{
      --bg-void: #0a0a14;
      --bg-arena: #0f0f1e;
      --bg-glass: rgba(255,255,255,0.04);
      --border-dim: rgba(255,255,255,0.07);
      --border-glow: rgba(255,255,255,0.15);
      --accent-primary: #facc15;
      --accent-electric: #38bdf8;
      --text-bright: #f0f4ff;
      --text-muted: #64748b;
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      background: radial-gradient(ellipse at 40% 20%, #1a0a2e 0%, var(--bg-void) 60%);
      color: var(--text-bright);
      font-family: 'Nunito', system-ui, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Arena grid layer */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, transparent 1px, transparent 60px, rgba(255,255,255,0.025) 61px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, transparent 1px, transparent 60px, rgba(255,255,255,0.025) 61px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, transparent 75%);
    }

    /* Light mode overrides */
    body.light-mode{
      background: linear-gradient(135deg,#fef9c3 0%,#fef3c7 30%,#dbeafe 70%,#eff6ff 100%);
      color:#1e293b;
    }
    body.light-mode::before{ opacity:0.15; }
    body.light-mode .glass{background:rgba(255,255,255,0.75)!important;border-color:rgba(0,0,0,0.08)!important}
    body.light-mode .glass-dark{background:rgba(255,255,255,0.5)!important}
    body.light-mode .text-slate-100,body.light-mode .text-slate-200,body.light-mode .text-slate-300{color:#1e293b!important}
    body.light-mode .text-slate-400,body.light-mode .text-slate-500{color:#475569!important}
    body.light-mode input,body.light-mode textarea,body.light-mode select{background:#fff!important;color:#1e293b!important;border-color:#d1d5db!important}
    body.light-mode .race-track-bg{background:linear-gradient(90deg,#86efac,#67e8f9,#c4b5fd)!important}

    /* ── Light mode: typing zone ── */
    body.light-mode{ --bg-arena:#f8fafc; }
    body.light-mode .word-current{
      color:#1e293b;
      background:rgba(161,98,7,0.1);
      border-bottom-color:#b45309;
    }
    body.light-mode .word-current.word-error{
      color:#1e293b;
      background:rgba(185,28,28,0.08);
      border-bottom-color:#dc2626;
    }
    body.light-mode .word-upcoming{ color:#475569; }
    body.light-mode .char-correct{ color:#15803d; }
    body.light-mode .char-wrong{ color:#dc2626; }
    body.light-mode .char-cursor{ border-left-color:#b45309; }
    body.light-mode .char-cursor-error{ border-left-color:#dc2626; }

    /* Glass cards */
    .glass{
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-dim);
      box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .glass:hover{
      border-color: var(--border-glow);
      box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .glass-dark{background:rgba(10,10,20,0.6)}

    .gradient-text{
      background: linear-gradient(135deg, #f87171 0%, var(--accent-primary) 50%, var(--accent-electric) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .pokeball-gradient{background:linear-gradient(180deg,#ef4444 0%,#ef4444 45%,#1e293b 45%,#1e293b 55%,#f8fafc 55%,#f8fafc 100%)}

    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.2);border-radius:3px}

    /* Display / headline font */
    .font-display, h1, .game-title{ font-family:'Fredoka One', sans-serif; letter-spacing:0.02em; }
    .font-ui{ font-family:'Space Mono', monospace; }

    /* ═══════════════════ KEYFRAMES ═══════════════════ */
    @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
    @keyframes slideUp{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes slideDown{0%{opacity:0;transform:translateY(-20px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
    @keyframes countPop{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.4)}100%{transform:scale(1);opacity:1}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes dash{0%{stroke-dashoffset:100}100%{stroke-dashoffset:0}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    @keyframes nitroFlash{0%{filter:brightness(1)}50%{filter:brightness(1.8) saturate(1.5)}100%{filter:brightness(1)}}
    @keyframes speedLines{0%{transform:translateX(0);opacity:0.6}100%{transform:translateX(-200px);opacity:0}}
    @keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
    @keyframes confettiFall{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(700px) rotate(720deg);opacity:0}}
    @keyframes raceFinish{0%{transform:scale(0.5) rotate(-10deg);opacity:0}60%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
    @keyframes progressPulse{0%,100%{box-shadow:0 0 5px rgba(250,204,21,0.3)}50%{box-shadow:0 0 20px rgba(250,204,21,0.8)}}
    @keyframes electricArc{0%{opacity:0}25%{opacity:1}50%{opacity:1}75%{opacity:0.5}100%{opacity:0}}
    @keyframes runAnimation{
      0%  {transform:translateY(0px) scaleX(1) rotate(0deg)}
      20% {transform:translateY(-6px) scaleX(0.88) rotate(-8deg)}
      50% {transform:translateY(-4px) scaleX(0.85) rotate(0deg)}
      75% {transform:translateY(-6px) scaleX(0.88) rotate(8deg)}
      100%{transform:translateY(0px) scaleX(1) rotate(0deg)}
    }
    @keyframes particleDrift{
      0%{transform:translate(0,0) scale(1);opacity:0.4}
      33%{transform:translate(30px,-40px) scale(1.2);opacity:0.6}
      66%{transform:translate(-20px,-70px) scale(0.8);opacity:0.3}
      100%{transform:translate(10px,-120px) scale(0);opacity:0}
    }
    @keyframes glowPulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.05)}}
    @keyframes rainbowShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes nitroCrush{0%,100%{opacity:0.07}50%{opacity:0.20}}
    @keyframes arenaRacePulse{0%,100%{opacity:1}50%{opacity:0.7;filter:brightness(1.3)}}

    /* ═══════════════════ UTILITY CLASSES ═══════════════════ */
    .animate-fade{animation:fadeIn 0.5s ease-out}
    .animate-slide-up{animation:slideUp 0.5s ease-out}
    .animate-pop{animation:popIn 0.4s ease-out}
    .animate-count{animation:countPop 0.7s ease-out}
    .animate-bounce-slow{animation:bounce 2s ease-in-out infinite}
    .animate-shake{animation:shake 0.4s ease-in-out}
    .animate-nitro{animation:nitroFlash 0.3s ease-out}
    .animate-finish{animation:raceFinish 0.6s ease-out}
    .animate-sparkle{animation:sparkle 0.6s ease-out}
    .animate-glow-pulse{animation:glowPulse 3s ease-in-out infinite}

    .confetti-piece{position:fixed;z-index:9999;pointer-events:none}
    .toast-enter{animation:slideDown 0.4s ease-out}

    /* Race track */
    .race-track-bg{background:linear-gradient(90deg,#1a0630,#0f0f1e,#061420)}
    .track-lane{
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }
    .track-lane::before{
      content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(250,204,21,0.15),transparent);
    }
    .track-lane::after{
      content:'';position:absolute;top:0;left:0;right:0;bottom:0;
      background: repeating-linear-gradient(90deg, transparent 0px, transparent 28px, rgba(255,255,255,0.02) 29px, transparent 30px);
      pointer-events:none;
    }
    .pokemon-racer{transition:left 0.12s linear;position:absolute;top:50%;transform:translateY(-50%)}
    .pokemon-racer.running{animation:runAnimation 0.2s ease-in-out infinite}
    .speed-line{position:absolute;height:2px;border-radius:1px;animation:speedLines 0.4s linear forwards;pointer-events:none}

    /* XP / progress */
    .xp-bar{transition:width 0.6s ease-out}
    .combo-badge{animation:popIn 0.3s ease-out}
    .nitro-active{filter:brightness(1.3) saturate(1.3);text-shadow:0 0 10px rgba(250,204,21,0.5)}
    .passage-cursor{border-left:2px solid var(--accent-primary);animation:progressPulse 1s ease-in-out infinite}

    /* Particle dots */
    .particle{
      position:fixed;
      width:3px;height:3px;
      border-radius:50%;
      background:var(--accent-primary);
      pointer-events:none;
      z-index:0;
      animation: particleDrift linear infinite;
    }
    .particle.blue{ background: var(--accent-electric); }
    .particle.white{ background: rgba(255,255,255,0.6); }

    /* Running Pokémon silhouettes */
    @keyframes silhouetteRun{
      0%  {transform:translateX(-120px)}
      100%{transform:translateX(110vw)}
    }
    @keyframes silhouetteRunRTL{
      0%  {transform:translateX(110vw) scaleX(-1)}
      100%{transform:translateX(-120px) scaleX(-1)}
    }
    .poke-silhouette{
      position:fixed;
      pointer-events:none;
      z-index:0;
      filter:blur(0.5px);
    }
    .sil-ltr{left:0;animation:silhouetteRun linear infinite;}
    .sil-rtl{left:0;animation:silhouetteRunRTL linear infinite;}

    /* Countdown slam-in */
    @keyframes cdSlam{
      0%  {transform:scale(3.5);opacity:0}
      60% {transform:scale(0.9);opacity:1}
      100%{transform:scale(1);opacity:1}
    }
    @keyframes cdGo{
      0%  {transform:scale(1);opacity:1}
      60% {transform:scale(2.2);opacity:0.8}
      100%{transform:scale(3.5);opacity:0}
    }
    @keyframes cdBgPulse{
      0%,100%{opacity:0}
      50%    {opacity:0.18}
    }

    /* Word correct flash */
    @keyframes wordCorrectFlash{
      0%  {background:rgba(34,197,94,0.35);transform:scale(1.12);color:#4ade80;}
      70% {background:rgba(34,197,94,0.15);transform:scale(1.04);}
      100%{background:transparent;transform:scale(1);}
    }
    .word-flash-correct{
      animation:wordCorrectFlash 180ms ease-out forwards;
      border-radius:3px;
    }

    /* Nitro lane burst */
    @keyframes nitroLaneBurst{
      0%  {opacity:0.9}
      100%{opacity:0}
    }
    .nitro-lane-burst{
      position:absolute;inset:0;pointer-events:none;z-index:8;
      border-radius:inherit;
      animation:nitroLaneBurst 400ms ease-out forwards;
    }
    @keyframes nitroSpriteBurst{
      0%  {transform:scale(1.3)}
      100%{transform:scale(1)}
    }
    .sprite-nitro-burst img,.sprite-nitro-burst span{
      animation:nitroSpriteBurst 300ms ease-out forwards;
    }

    /* Victory banner */
    @keyframes victorySlam{
      0%  {transform:translateY(-120px) scale(0.7);opacity:0}
      55% {transform:translateY(8px) scale(1.05);opacity:1}
      100%{transform:translateY(0) scale(1);opacity:1}
    }
    .victory-banner{
      position:fixed;top:0;left:0;right:0;z-index:999;
      display:flex;align-items:center;justify-content:center;
      padding:12px;pointer-events:none;
      animation:victorySlam 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* Bot finish toast */
    @keyframes botToastIn{
      0%  {transform:translateY(-16px);opacity:0}
      100%{transform:translateY(0);opacity:1}
    }
    @keyframes botToastOut{
      0%  {opacity:1}
      100%{opacity:0}
    }

    /* Professor Oak bounce */
    @keyframes oakBounceAnim{
      0%,100%{transform:translateY(0)}
      20%    {transform:translateY(-10px)}
      40%    {transform:translateY(-5px)}
      60%    {transform:translateY(-8px)}
      80%    {transform:translateY(-3px)}
    }
    .oak-bounce{animation:oakBounceAnim 0.7s ease-out forwards;}

    /* ═══════════════════ PHASE 2: RACE ARENA ═══════════════════ */

    /* --- Type-based nitro attack keyframes --- */
    @keyframes electricBolt{
      0%{opacity:1;transform:translateX(0) scaleX(0.5) scaleY(1)}
      40%{opacity:1;transform:translateX(60%) scaleX(1.4) scaleY(1.5)}
      100%{opacity:0;transform:translateX(130%) scaleX(2) scaleY(0.5)}
    }
    @keyframes fireRing{
      0%{opacity:1;transform:scale(0.3);border-width:6px}
      60%{opacity:0.8;transform:scale(1.8);border-width:3px}
      100%{opacity:0;transform:scale(3.5);border-width:1px}
    }
    @keyframes waterRipple{
      0%{opacity:1;transform:scale(0.2) translateX(0);border-radius:30% 70% 70% 30%}
      50%{opacity:0.7;transform:scale(1.2) translateX(40%);border-radius:50%}
      100%{opacity:0;transform:scale(2.5) translateX(70%);border-radius:50%}
    }
    @keyframes leafBurst{
      0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}
      50%{opacity:1;transform:translate(40px,-20px) rotate(180deg) scale(1.4)}
      100%{opacity:0;transform:translate(90px,10px) rotate(360deg) scale(0.3)}
    }
    @keyframes psychicSpiral{
      0%{opacity:1;transform:scale(0.3) rotate(0deg)}
      50%{opacity:0.9;transform:scale(1.5) rotate(180deg)}
      100%{opacity:0;transform:scale(3) rotate(360deg)}
    }
    @keyframes starburst{
      0%{opacity:1;transform:scale(0.2) rotate(0deg)}
      40%{opacity:1;transform:scale(1.3) rotate(45deg)}
      100%{opacity:0;transform:scale(2.5) rotate(90deg)}
    }
    @keyframes laneFinishPulse{
      0%,100%{opacity:0}
      20%,80%{opacity:1}
    }
    @keyframes finishBadgePop{
      0%{opacity:0;transform:translateY(6px) scale(0.7)}
      60%{transform:translateY(-3px) scale(1.1)}
      100%{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes spriteHover{
      0%,100%{transform:translateY(-50%) translateY(0)}
      50%{transform:translateY(-50%) translateY(-3px)}
    }
    @keyframes nitroTrail{
      0%{opacity:0.8;transform:scaleX(1)}
      100%{opacity:0;transform:scaleX(0)}
    }
    @keyframes wpmColorPulse{
      0%,100%{opacity:1}
      50%{opacity:0.7;filter:brightness(1.4)}
    }
    @keyframes checkered{
      0%{background-position:0 0}
      100%{background-position:0 16px}
    }
    @keyframes dashScroll{
      from{background-position:0 0}
      to{background-position:-80px 0}
    }
    @keyframes crowdBob{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-2px)}
    }

    /* --- Race arena container --- */
    .race-arena{
      background:
        radial-gradient(ellipse 140px 45px at 12% 35%, rgba(255,255,255,0.018) 0%, transparent 100%),
        radial-gradient(ellipse 90px 30px at 43% 65%, rgba(255,255,255,0.010) 0%, transparent 100%),
        radial-gradient(ellipse 110px 50px at 72% 25%, rgba(255,255,255,0.014) 0%, transparent 100%),
        radial-gradient(ellipse 60px 25px at 88% 72%, rgba(255,255,255,0.018) 0%, transparent 100%),
        radial-gradient(ellipse 80px 40px at 28% 80%, rgba(255,255,255,0.008) 0%, transparent 100%),
        #1a1a1a;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .race-arena::before{
      content:'';position:absolute;inset:0;
      background: repeating-linear-gradient(90deg,transparent 0px,transparent 58px,rgba(255,255,255,0.012) 59px,transparent 60px);
      pointer-events:none;
      z-index:1;
    }
    .arena-header{
      background: rgba(0,0,0,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position:relative;z-index:10;
    }

    /* --- Road environment strips --- */
    .road-env-top{ display:flex;flex-direction:column; }
    .road-crowd{
      height:28px;
      background: linear-gradient(180deg,rgba(20,5,40,0.95),rgba(15,5,30,0.9));
      position:relative;overflow:hidden;flex-shrink:0;
    }
    .road-grass{
      height:36px;
      background: repeating-linear-gradient(
        170deg,
        #16a34a 0px, #15803d 8px,
        #166534 8px, #14532d 16px
      );
      position:relative;overflow:hidden;flex-shrink:0;
    }
    .road-grass-bottom{
      height:36px;
      background: repeating-linear-gradient(
        170deg,
        #14532d 0px, #166534 8px,
        #15803d 8px, #16a34a 16px
      );
      position:relative;overflow:hidden;flex-shrink:0;
    }

    /* --- Individual lanes --- */
    .race-lane{
      position:relative;overflow:visible;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.3s ease;
      background:
        repeating-linear-gradient(180deg,transparent 0px,transparent 18px,rgba(255,255,255,0.018) 19px,transparent 20px),
        #1c1c2e;
    }
    .race-lane.lane-player{
      background:
        repeating-linear-gradient(180deg,transparent 0px,transparent 18px,rgba(255,255,255,0.018) 19px,transparent 20px),
        #1e1a2e;
      border-bottom-color: rgba(250,204,21,0.15);
    }    .race-lane.lane-finished{
      animation: laneFinishPulse 1.2s ease-out forwards;
    }
    .lane-track-inner{
      position:absolute;left:4px;right:4px;top:0;bottom:0;overflow:visible;
    }
    .lane-start-line{
      position:absolute;left:80px;top:0;bottom:0;width:2px;
      background:rgba(255,255,255,0.2);
      z-index:2;
    }
    .lane-start-label{
      position:absolute;left:80px;top:2px;
      font-family:'Space Mono',monospace;font-size:7px;font-weight:700;
      color:rgba(255,255,255,0.35);letter-spacing:0.04em;
      transform:translateX(-50%);pointer-events:none;z-index:3;
    }
    .lane-finish-flag{
      position:absolute;right:0;top:-4px;bottom:-4px;width:20px;
      background: repeating-conic-gradient(rgba(255,255,255,0.95) 0% 25%, rgba(0,0,0,0.85) 0% 50%) 0 0 / 8px 8px;
      opacity:0.75;
      box-shadow:-3px 0 12px rgba(255,255,255,0.2), 0 0 20px rgba(255,255,255,0.08);
      z-index:3;
    }
    .lane-progress-bar{
      position:absolute;bottom:0;left:0;right:20px;height:5px;border-radius:3px;
      background:rgba(255,255,255,0.03);
      overflow:hidden;z-index:2;
    }
    .lane-progress-fill{
      height:100%;border-radius:3px;transition:width 0.12s linear;
    }
    .finish-badge{
      position:absolute;right:22px;top:50%;transform:translateY(-50%);
      font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;
      animation: finishBadgePop 0.4s ease-out forwards;
      letter-spacing:0.05em;font-family:'Space Mono',monospace;
      z-index:20;
    }

    /* Racer name/wpm badge */
    .racer-badge{
      position:absolute;top:3px;transform:translateX(-50%);
      background:rgba(0,0,0,0.82);
      border-radius:6px;
      padding:1px 5px;
      font-family:'Space Mono',monospace;
      font-size:7px;font-weight:700;
      white-space:nowrap;
      pointer-events:none;
      z-index:25;
      letter-spacing:0.03em;
    }
    .sprite-shadow-disc{
      position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
      width:50px;height:10px;
      border-radius:50%;
      background:radial-gradient(ellipse,rgba(0,0,0,0.5) 0%,transparent 70%);
      pointer-events:none;z-index:1;
    }

    /* Falling leaves animation */
    @keyframes leafDrift{
      0%  {transform:translateX(0) rotate(0deg) translateY(0px);}
      20% {transform:translateX(-20vw) rotate(144deg) translateY(6px);}
      40% {transform:translateX(-40vw) rotate(288deg) translateY(-4px);}
      60% {transform:translateX(-60vw) rotate(432deg) translateY(7px);}
      80% {transform:translateX(-80vw) rotate(576deg) translateY(-3px);}
      100%{transform:translateX(-105vw) rotate(720deg) translateY(0px);}
    }
    .falling-leaf{
      position:absolute;right:0;pointer-events:none;
      animation:leafDrift linear infinite;
      z-index:8;font-size:5px;line-height:1;
    }

    /* Reaction panel */
    .reaction-panel-wrap{
      position:absolute;right:4px;top:50%;transform:translateY(-50%);
      z-index:40;display:flex;flex-direction:column;gap:3px;
    }
    .reaction-btn{
      background:rgba(0,0,0,0.75);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:6px;padding:3px 6px;
      font-size:9px;color:rgba(255,255,255,0.7);
      cursor:pointer;white-space:nowrap;
      font-family:'Space Mono',monospace;
      transition:all 0.15s;
    }
    .reaction-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.3);}
    @keyframes stickerRise{
      0%  {transform:translateY(0) scale(1);opacity:1;}
      80% {transform:translateY(-60px) scale(1.2);opacity:0.8;}
      100%{transform:translateY(-80px) scale(0.8);opacity:0;}
    }
    .reaction-sticker-el{
      position:absolute;right:50px;
      font-size:22px;pointer-events:none;z-index:50;
      animation:stickerRise 1.8s ease-out forwards;
    }

    /* Arena tilt for camera perspective */
    .race-arena-tilt-wrap{
      transition:perspective 1s ease;
    }
    .race-arena-road{
      transition:transform 1s ease;
    }

    /* --- Sprite image --- */
    .sprite-img{
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .sprite-img.running{
      animation: runAnimation 0.35s ease-in-out infinite;
    }
    .sprite-img.sprite-hover{
      animation: spriteHover 0.5s ease-in-out infinite;
    }
    .sprite-nitro{
      filter: brightness(1.6) saturate(2) drop-shadow(0 0 8px var(--accent-primary));
    }

    /* --- Nitro attack effects --- */
    .nitro-attack{
      position:absolute;top:50%;transform:translateY(-50%);
      pointer-events:none;z-index:20;
    }
    .nitro-attack.electric{
      width:80px;height:14px;
      background:linear-gradient(90deg,rgba(250,204,21,0.9),rgba(56,189,248,0.6),transparent);
      border-radius:2px;
      clip-path: polygon(0 40%, 30% 0%, 50% 40%, 70% 0%, 100% 40%, 70% 100%, 50% 60%, 30% 100%);
      animation: electricBolt 0.5s ease-out forwards;
      box-shadow:0 0 12px rgba(250,204,21,0.8);
    }
    .nitro-attack.fire{
      width:40px;height:40px;
      border:4px solid rgba(249,115,22,0.9);
      border-radius:50%;
      animation: fireRing 0.6s ease-out forwards;
      box-shadow:0 0 20px rgba(249,115,22,0.6),inset 0 0 10px rgba(249,115,22,0.3);
    }
    .nitro-attack.water{
      width:36px;height:36px;
      border:3px solid rgba(59,130,246,0.9);
      animation: waterRipple 0.6s ease-out forwards;
      box-shadow:0 0 15px rgba(59,130,246,0.5);
    }
    .nitro-attack.grass{
      width:12px;height:12px;
      background:rgba(34,197,94,0.9);
      clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      animation: leafBurst 0.6s ease-out forwards;
      box-shadow:0 0 10px rgba(34,197,94,0.7);
    }
    .nitro-attack.psychic{
      width:38px;height:38px;
      border:3px solid rgba(139,92,246,0.9);
      border-top-color:transparent;
      border-radius:50%;
      animation: psychicSpiral 0.6s ease-out forwards;
      box-shadow:0 0 18px rgba(139,92,246,0.6);
    }
    .nitro-attack.default{
      width:30px;height:30px;
      background:rgba(255,255,255,0.9);
      clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      animation: starburst 0.5s ease-out forwards;
      box-shadow:0 0 16px rgba(255,255,255,0.7);
    }
    /* Nitro trail behind player */
    .nitro-trail{
      position:absolute;top:50%;transform:translateY(-50%);
      height:3px;border-radius:2px;
      pointer-events:none;
      background:linear-gradient(90deg,transparent,var(--accent-primary));
      animation:nitroTrail 0.4s ease-out forwards;
    }

    /* Arena top-progress bar (race completion) */
    .arena-top-bar{position:absolute;top:0;left:0;right:0;height:3px;z-index:10;overflow:hidden;background:rgba(255,255,255,0.04);}
    .arena-top-fill{height:100%;transition:width 0.12s linear;border-radius:0 2px 2px 0;}

    /* Nitro active: type-colored tint over arena */
    .nitro-arena-tint{position:absolute;inset:0;pointer-events:none;z-index:4;animation:nitroCrush 0.5s ease-in-out infinite;}

    /* Road center dashed line per lane — animated to scroll right→left */
    .lane-road-dash{
      position:absolute;left:0;right:20px;top:50%;margin-top:-1px;height:2px;
      background:repeating-linear-gradient(90deg,rgba(255,255,255,0.25) 0px,rgba(255,255,255,0.25) 24px,transparent 24px,transparent 72px);
      background-size:96px 2px;
      animation:dashScroll 1.2s linear infinite;
      pointer-events:none;z-index:0;
    }

    /* Sprite glow shadow on the track */
    .sprite-track-shadow{
      position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
      height:5px;border-radius:50%;filter:blur(5px);pointer-events:none;
    }

    /* Rainbow combo shimmer */
    .combo-rainbow-text{
      background:linear-gradient(90deg,#ef4444,#f97316,#facc15,#4ade80,#60a5fa,#c084fc,#ef4444);
      background-size:400% 400%;
      animation:rainbowShimmer 0.7s linear infinite;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      font-family:'Boogaloo',sans-serif;font-size:2.4rem;line-height:1;
    }

    /* ═══════════════════ PHASE 3: TYPING ZONE ═══════════════════ */
    @keyframes wordShake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-5px)}
      40%{transform:translateX(5px)}
      60%{transform:translateX(-3px)}
      80%{transform:translateX(3px)}
    }
    @keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes lineSlide{0%{transform:translateY(8px);opacity:0}100%{transform:translateY(0);opacity:1}}
    @keyframes wordComplete{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
    @keyframes errorFlash{0%{background:rgba(239,68,68,0.3)}100%{background:rgba(239,68,68,0.12)}}

    .typing-zone{
      position:relative;
      cursor:text;
    }
    .passage-viewport{
      height:6.2em;
      overflow:hidden;
      position:relative;
      padding:4px 0;
    }
    .passage-viewport::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1.4em;
      background:linear-gradient(180deg,var(--bg-arena),transparent);
      z-index:2;pointer-events:none;
    }
    .passage-viewport::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:1.4em;
      background:linear-gradient(0deg,var(--bg-arena),transparent);
      z-index:2;pointer-events:none;
    }
    .passage-inner{
      font-family:'JetBrains Mono',monospace;
      font-size:1.1rem;
      line-height:2em;
      transition:transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94);
      word-break:break-word;
      padding:0 2px;
    }
    .word-upcoming{
      color:#64748b;
    }
    .word-done-correct{
      color:#22c55e;
      opacity:0.65;
    }
    .word-done-error{
      color:#ef4444;
      opacity:0.65;
      text-decoration:underline wavy rgba(239,68,68,0.5);
    }
    .word-current{
      background:rgba(250,204,21,0.12);
      border-bottom:2px solid #facc15;
      border-radius:3px 3px 0 0;
      padding:0 3px;
      color:var(--text-bright);
    }
    .word-current.word-error{
      background:rgba(239,68,68,0.13);
      border-bottom-color:#ef4444;
      animation:wordShake 0.35s ease-out, errorFlash 0.4s ease-out;
    }
    .char-correct{color:#4ade80}
    .char-wrong{color:#f87171;text-decoration:underline}
    .char-upcoming{color:inherit}
    .char-cursor{
      border-left:2px solid #facc15;
      margin-left:-1px;
      animation:cursorBlink 1s ease-in-out infinite;
    }
    .char-cursor-error{
      border-left-color:#ef4444;
    }
    .word-space{ display:inline }

    /* Capture textarea — invisible on desktop, docked bar on mobile */
    .typing-capture{
      position:fixed;
      left:-9999px;top:50%;
      width:1px;height:1px;
      opacity:0;
      pointer-events:none;
      resize:none;
      border:none;
      background:transparent;
    }
    @media(max-width:768px){
      .typing-capture{
        position:fixed;bottom:0;left:0;right:0;
        width:100%;height:52px;
        opacity:1;pointer-events:auto;
        background:rgba(10,10,20,0.97);
        border-top:1px solid rgba(255,255,255,0.1);
        color:var(--text-bright);
        font-family:'JetBrains Mono',monospace;
        font-size:16px;
        padding:14px 20px;
        z-index:60;
        outline:none;
      }
    }
    /* ═══════════════════ PHASE 4: HUD CSS ═══════════════════ */
    @keyframes comboBounce{
      0%{transform:scale(1)}
      30%{transform:scale(1.35)}
      60%{transform:scale(0.9)}
      80%{transform:scale(1.1)}
      100%{transform:scale(1)}
    }
    @keyframes bannerDrop{
      0%{transform:translateY(-100%) scaleY(0.6);opacity:0}
      15%{transform:translateY(0) scaleY(1.06);opacity:1}
      20%{transform:translateY(0) scaleY(1)}
      80%{transform:translateY(0) scaleY(1);opacity:1}
      100%{transform:translateY(-30px);opacity:0}
    }
    @keyframes rainbow{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }
    @keyframes confettiFall{
      0%{transform:translateY(-10px) rotate(0deg);opacity:1}
      100%{transform:translateY(140px) rotate(720deg);opacity:0}
    }
    @keyframes wpmPop{
      0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}
    }
    @keyframes nitroPulse{
      0%,100%{box-shadow:0 0 6px var(--pc,#facc15)}
      50%{box-shadow:0 0 20px var(--pc,#facc15),0 0 40px var(--pc,#facc15)}
    }
    .combo-bounce{animation:comboBounce 0.35s cubic-bezier(0.36,0.07,0.19,0.97) both}
    .wpm-pop{animation:wpmPop 0.3s ease-out both}
    .milestone-banner{
      position:fixed;top:0;left:0;right:0;z-index:200;
      pointer-events:none;
      text-align:center;
      padding:10px 20px;
      font-family:'Boogaloo',sans-serif;
      font-size:2rem;
      letter-spacing:0.04em;
      animation:bannerDrop 1.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .milestone-t1{background:linear-gradient(90deg,rgba(15,15,30,0.96),rgba(30,41,59,0.97),rgba(15,15,30,0.96));color:#f1f5f9;}
    .milestone-t2{background:linear-gradient(90deg,rgba(15,15,30,0.96),rgba(78,63,0,0.97),rgba(15,15,30,0.96));color:#fde047;}
    .milestone-t3{background:linear-gradient(90deg,rgba(15,15,30,0.96),rgba(120,40,0,0.97),rgba(15,15,30,0.96));color:#fb923c;text-shadow:0 0 20px #f97316,0 0 40px #f9731688;}
    .milestone-t4{
      background:linear-gradient(270deg,#ef4444,#f97316,#facc15,#4ade80,#60a5fa,#c084fc,#ef4444);
      background-size:400% 400%;
      animation:bannerDrop 1.7s cubic-bezier(0.22,1,0.36,1) forwards, rainbow 1s linear infinite;
      color:#fff;font-size:2.4rem;
      text-shadow:0 2px 16px rgba(0,0,0,0.6);
    }
    .confetti-container{position:fixed;top:0;left:0;right:0;height:160px;pointer-events:none;z-index:201;overflow:hidden;}
    .topic-badge{
      display:inline-flex;align-items:center;gap:4px;
      font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
      padding:2px 8px;border-radius:999px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      color:var(--text-muted);
      letter-spacing:0.03em;
      max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .nitro-full-pulse{animation:nitroPulse 0.8s ease-in-out infinite;}
    /* ═══════════════════ PHASE 5: LECTURE MANAGER ═══════════════════ */
    .upload-tabs{ display:flex;gap:4px;padding:4px;background:rgba(255,255,255,0.04);border-radius:12px; }
    .upload-tab{
      flex:1;padding:6px 10px;border-radius:9px;font-family:'Space Mono',monospace;
      font-size:10px;font-weight:700;letter-spacing:0.04em;text-align:center;
      color:var(--text-muted);border:none;background:transparent;cursor:pointer;transition:all 0.15s;
    }
    .upload-tab:hover{color:var(--text-bright);background:rgba(255,255,255,0.05);}
    .upload-tab.active{background:rgba(250,204,21,0.12);color:var(--accent-primary);border:1px solid rgba(250,204,21,0.25);}
    body.light-mode .upload-tab.active{background:rgba(161,98,7,0.1);color:#b45309;border-color:rgba(161,98,7,0.25);}
    .upload-zone{
      border:2px dashed rgba(255,255,255,0.13);border-radius:16px;padding:28px 20px;
      text-align:center;cursor:pointer;transition:all 0.2s;
      background:rgba(255,255,255,0.02);
    }
    .upload-zone:hover,.upload-zone-drag{border-color:var(--accent-primary);background:rgba(250,204,21,0.05);}
    body.light-mode .upload-zone{border-color:rgba(0,0,0,0.15);background:rgba(0,0,0,0.02);}
    body.light-mode .upload-zone:hover,body.light-mode .upload-zone-drag{border-color:#b45309;background:rgba(161,98,7,0.05);}
    .lec-card{
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
      border-radius:16px;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;
    }
    .lec-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.25);border-color:rgba(255,255,255,0.13);}
    body.light-mode .lec-card{background:rgba(255,255,255,0.7);border-color:rgba(0,0,0,0.08);}
    body.light-mode .lec-card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.12);}
    .lec-card-header{padding:14px 16px 10px;background:rgba(255,255,255,0.03);}
    .lec-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:9px;font-family:'Space Mono',monospace;font-weight:700;letter-spacing:0.04em;background:rgba(96,165,250,0.15);color:#60a5fa;border:1px solid rgba(96,165,250,0.2);}
    body.light-mode .lec-tag{background:rgba(37,99,235,0.1);color:#1d4ed8;border-color:rgba(37,99,235,0.2);}
    .sparkline{display:flex;align-items:flex-end;gap:2px;height:20px;}
    .sparkline-bar{width:5px;border-radius:2px;min-height:3px;transition:height 0.4s cubic-bezier(0.34,1.56,0.64,1);}
    .lec-stat{display:flex;flex-direction:column;align-items:center;gap:1px;}
    .lec-stat-val{font-family:'Boogaloo',sans-serif;font-size:1.3rem;line-height:1;color:var(--text-bright);}
    .lec-stat-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--text-muted);letter-spacing:0.04em;}
    body.light-mode .lec-stat-val{color:#1e293b;}
    .empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 20px;gap:16px;}
    .tag-input{background:transparent;border:none;outline:none;font-size:10px;font-family:'Space Mono',monospace;color:var(--text-bright);width:100px;}
    body.light-mode .tag-input{color:#1e293b;}

    .error-counter{
      font-family:'Space Mono',monospace;
      font-size:11px;
      color:#ef4444;
      opacity:0.85;
    }
    .typing-zone-border-error{ border-color:rgba(239,68,68,0.5)!important; }
    .typing-zone-border-nitro{ border-color:var(--accent-primary, #facc15)!important;box-shadow:0 0 16px rgba(250,204,21,0.1); }

    /* ── Boost particles (CSS diamond trail) ── */
    @keyframes boostParticleDrift{
      0%{opacity:0.9;transform:translateX(0) scale(1);}
      100%{opacity:0;transform:translateX(-80px) scale(0.3);}
    }
    .boost-particle{
      position:absolute;pointer-events:none;z-index:20;
      animation:boostParticleDrift 0.6s ease-out forwards;
      line-height:1;
    }

    /* ── Leaf fall with tumble rotation ── */
    @keyframes leafFall{
      0%{transform:translateX(0) rotate(0deg);}
      100%{transform:translateX(-300px) rotate(720deg);}
    }

    /* ── WPM badge pulse ── */
    @keyframes wpmBadgePulse{
      0%,100%{transform:translateX(-50%) scale(1);}
      50%{transform:translateX(-50%) scale(1.18);}
    }
    .racer-wpm-badge{
      position:absolute;top:3px;transform:translateX(-50%);
      border-radius:8px;
      padding:2px 7px;
      font-family:'Space Mono',monospace;
      white-space:nowrap;
      pointer-events:none;
      z-index:25;
      letter-spacing:0.03em;
    }
    .racer-wpm-badge.pulse{
      animation:wpmBadgePulse 0.3s ease-out;
    }

    /* ── Overtaken warning ── */
    @keyframes overtakenIn{
      0%{opacity:0;transform:translateX(-50%) scale(0.7);}
      60%{opacity:1;transform:translateX(-50%) scale(1.08);}
      100%{opacity:1;transform:translateX(-50%) scale(1);}
    }
    @keyframes overtakenOut{
      0%{opacity:1;}
      100%{opacity:0;}
    }
    .overtaken-badge{
      position:absolute;left:50%;top:50%;transform:translateX(-50%) translateY(-50%);
      background:rgba(220,38,38,0.92);color:#fff;
      font-family:'Space Mono',monospace;font-size:11px;font-weight:900;
      padding:4px 12px;border-radius:8px;border:1px solid #ef4444;
      pointer-events:none;z-index:50;
      animation:overtakenIn 0.3s ease-out forwards;
      white-space:nowrap;
      letter-spacing:0.04em;
    }
    .overtaken-badge.fading{
      animation:overtakenOut 0.4s ease-in forwards;
    }

    /* ── Between-lane dividers ── */
    .lane-divider{
      height:1px;
      pointer-events:none;
      position:relative;z-index:4;
    }

    /* ── Race scoreboard header ── */
    .arena-scoreboard{
      background: rgba(0,0,0,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position:relative;z-index:10;
      backdrop-filter:blur(8px);
    }
    .scoreboard-progress-bar{
      height:4px;border-radius:2px;overflow:hidden;
      background:rgba(255,255,255,0.08);
      flex:1;
    }
    .scoreboard-progress-fill{
      height:100%;border-radius:2px;transition:width 0.12s linear;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

    /* ═══════════════════ CONSTANTS ═══════════════════ */

    const spriteCache = {};  // pokemonId -> url | null
    function prefetchSprites(onUpdate) {
      const allIds = [...POKEMON.map(p=>p.id), ...BOT_POKEMON.map(b=>b.id)];
      allIds.forEach(id => {
        if (id in spriteCache) return;
        spriteCache[id] = null; // mark in-flight
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 5000); // 5s timeout
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`, {signal:ctrl.signal})
          .then(r => { if(!r.ok) throw new Error('not ok'); return r.json(); })
          .then(d => {
            clearTimeout(timer);
            const url = d?.sprites?.front_default;
            if (url) { spriteCache[id] = url; onUpdate(id, url); }
            else { spriteCache[id] = null; }
          })
          .catch(() => { clearTimeout(timer); spriteCache[id] = null; }); // emoji fallback
      });
    }

    function getDailyChallenge(lectures){
      const all=lectures.flatMap(l=>l.passages.map(p=>({text:p,lectureId:l.id,name:l.name})));
      if(!all.length)return null;
      const seed=new Date().toDateString();
      let h=0;for(const c of seed)h=(h*31+c.charCodeAt(0))&0x7fffffff;
      return all[h%all.length];
    }
    function getMasteryLevel(xp){
      let lvl=1,spent=0;
      while(true){const req=Math.floor(80*Math.pow(1.5,lvl-1));if(xp<spent+req)return{level:lvl,currentXp:xp-spent,needed:req};spent+=req;lvl++;}
    }

    function xpForLevel(lvl) { return Math.floor(100 * Math.pow(1.4, lvl - 1)); }
    function getLevel(totalXp) {
      let lvl = 1, xpNeeded = 0;
      while (true) { const req = xpForLevel(lvl); if (totalXp < xpNeeded + req) return { level:lvl, currentXp:totalXp - xpNeeded, needed:req }; xpNeeded += req; lvl++; }
    }

    function calcAvgWPM(races, n=10) { if(!races.length)return 40; const r=races.slice(-n); return r.reduce((a,x)=>a+(x.wpm||0),0)/r.length||40; }
    function normalizeChar(c) { if(c==="\u00A0")return" ";if(c==="\u2013"||c==="\u2014"||c==="\u2012")return"-";if(c==="\u2018"||c==="\u2019")return"'";if(c==="\u201C"||c==="\u201D")return'"';if(c==="\u2026")return"...";if(c==="\u00B4"||c==="\u0060")return"'";return c; }
    function truncPassage(t,m) { if(t.length<=m)return t; const c=t.substring(0,m),s=c.lastIndexOf(" "); return s>m*0.7?c.substring(0,s):c; }

    function getStreak(races) {
      if(!races.length)return 0;
      const days=new Set(races.map(r=>new Date(r.timestamp).toDateString()));
      let streak=0, d=new Date();
      while(true){
        if(days.has(d.toDateString())){streak++;d.setDate(d.getDate()-1);}
        else if(streak===0){d.setDate(d.getDate()-1);if(!days.has(d.toDateString()))break;}
        else break;
      }
      return streak;
    }
    function getStats(races,player) {
      const starterIds=new Set(['pikachu','charmander','squirtle','bulbasaur']);
      const startersPracticed=new Set(races.map(r=>r.pokemon).filter(id=>starterIds.has(id))).size;
      return {
        totalRaces:races.length,
        bestWpm:races.reduce((m,r)=>Math.max(m,r.wpm||0),0),
        perfectRaces:races.filter(r=>r.accuracy>=99.5).length,
        streak:getStreak(races),
        bestCombo:races.reduce((m,r)=>Math.max(m,r.bestCombo||0),0),
        nitroUses:player.nitroUses||0,
        level:getLevel(player.xp).level,
        totalChars:races.reduce((s,r)=>s+Math.round((r.wpm||0)*(r.timeSec||0)/60*5),0),
        lectureRaces:races.filter(r=>r.lectureIds?.length>0).length,
        startersPracticed,
      };
    }

    /* ═══════════════════ AUDIO ═══════════════════ */
    const AC = typeof AudioContext!=="undefined"?AudioContext:(typeof webkitAudioContext!=="undefined"?webkitAudioContext:null);
    let actx=null;
    function getAC(){if(!actx&&AC)actx=new AC();return actx;}
    function sfx(type){
      const c=getAC();if(!c)return;
      try{
        const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
        if(type==="key"){o.frequency.value=600+Math.random()*400;g.gain.value=0.025;o.type="sine";o.start();o.stop(c.currentTime+0.025);}
        else if(type==="err"){o.frequency.value=120;g.gain.value=0.07;o.type="square";o.start();o.stop(c.currentTime+0.1);}
        else if(type==="wordDone"){const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o.frequency.value=440;g.gain.value=0.04;o.type="sine";o.start();o.stop(c.currentTime+0.06);o2.frequency.value=660;g2.gain.value=0.04;o2.type="sine";o2.start(c.currentTime+0.07);o2.stop(c.currentTime+0.13);}
        else if(type==="raceStart"){[523,659,784].forEach((f,i)=>{const x=c.createOscillator(),gg=c.createGain();x.connect(gg);gg.connect(c.destination);x.frequency.value=f;gg.gain.value=0.1;x.type="triangle";x.start(c.currentTime+i*0.12);x.stop(c.currentTime+i*0.12+0.14);});}
        else if(type==="tick"){o.frequency.value=520;g.gain.value=0.08;o.type="sine";o.start();o.stop(c.currentTime+0.12);}
        else if(type==="go"){o.frequency.value=880;g.gain.value=0.12;o.type="triangle";o.start();o.stop(c.currentTime+0.3);}
        else if(type==="nitro"){[800,1000,1200,1400].forEach((f,i)=>{const x=c.createOscillator(),gg=c.createGain();x.connect(gg);gg.connect(c.destination);x.frequency.value=f;gg.gain.value=0.06;x.type="sawtooth";x.start(c.currentTime+i*0.04);x.stop(c.currentTime+i*0.04+0.08);});}
        else if(type==="win"){[523,659,784,1047,1319].forEach((f,i)=>{const x=c.createOscillator(),gg=c.createGain();x.connect(gg);gg.connect(c.destination);x.frequency.value=f;gg.gain.value=0.07;x.type="sine";x.start(c.currentTime+i*0.1);x.stop(c.currentTime+i*0.1+0.2);});}
        else if(type==="lvlup"){[440,554,659,880,1047,1319].forEach((f,i)=>{const x=c.createOscillator(),gg=c.createGain();x.connect(gg);gg.connect(c.destination);x.frequency.value=f;gg.gain.value=0.06;x.type="triangle";x.start(c.currentTime+i*0.08);x.stop(c.currentTime+i*0.08+0.15);});}
        else if(type==="ach"){[660,880,1100,1320,1540].forEach((f,i)=>{const x=c.createOscillator(),gg=c.createGain();x.connect(gg);gg.connect(c.destination);x.frequency.value=f;gg.gain.value=0.05;x.type="triangle";x.start(c.currentTime+i*0.06);x.stop(c.currentTime+i*0.06+0.12);});}
        else if(type==="combo"){o.frequency.value=700+Math.random()*200;g.gain.value=0.03;o.type="triangle";o.start();o.stop(c.currentTime+0.04);}
      }catch(e){}
    }

    function launchConfetti(){

        document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
      }

    function App(){

      const [races,setRaces]=useState(()=>load(STORE_KEYS.races,[]));
