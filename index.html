              {milestoneBanner.confetti&&(
                <div className="confetti-container">
                  {milestoneBanner.confetti.map(p=>(
                    <div key={p.id} style={{
                      position:'absolute',left:`${p.left}%`,top:0,
                      width:8,height:8,
                      borderRadius:p.id%3===0?'50%':2,
                      background:p.color,
                      animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`,
                    }}/>
                  ))}
                </div>
              )}
            </>
          )}

          {/* ═══ HUD ROW ═══ */}
          {/* Topic badge row */}
          {lectureName&&(
            <div className="flex justify-end">
              <span className="topic-badge">📚 {lectureName}</span>
            </div>
          )}

          <div className="grid grid-cols-4 gap-2">
            {/* WPM — Boogaloo 3rem, updates every 2s */}
            <div className="glass-dark rounded-xl px-3 py-2 text-center"
              style={{border:`1px solid ${wpmDisplay>=60?poke.color+'55':'rgba(255,255,255,0.06)'}`,
                      boxShadow:wpmDisplay>=60?`0 0 12px ${poke.color}22`:'none'}}>
              <div key={wpmDisplay} className="wpm-pop leading-none"
                style={{fontFamily:"'Boogaloo',sans-serif",fontSize:'2.6rem',
                  color:wpmDisplay>=100?'#ef4444':wpmDisplay>=80?'#f97316':wpmDisplay>=60?'var(--accent-primary)':'var(--text-bright)',
                  textShadow:wpmDisplay>=60?`0 0 20px currentColor`:'none',
                }}>
                {wpmDisplay}
              </div>
              <div className="text-[9px] font-ui mt-0.5" style={{color:'var(--text-muted)'}}>WPM</div>
            </div>

            {/* Accuracy */}
            <div className="glass-dark rounded-xl px-3 py-2 text-center" style={{border:'1px solid rgba(255,255,255,0.06)'}}>
              <div className="font-black leading-none"
                style={{fontFamily:"'Fredoka One',sans-serif",fontSize:'2rem',
                  color:accuracy>=99?'#22c55e':accuracy>=95?'#60a5fa':'#94a3b8'}}>
                {accuracy.toFixed(1)}%
              </div>
              <div className="text-[9px] font-ui mt-0.5" style={{color:'var(--text-muted)'}}>ACC</div>
            </div>

            {/* Combo — color progression: green 10x, yellow 25x, orange 50x, rainbow 100x */}
            {(()=>{
              const comboColor=combo>=50?'#f97316':combo>=25?'#facc15':combo>=10?'#22c55e':poke.color;
              const comboBorder=combo>=10?comboColor+'55':'rgba(255,255,255,0.06)';
              const comboGlow=combo>=10?`0 0 14px ${comboColor}44`:'none';
              return(
                <div className="glass-dark rounded-xl px-3 py-2 text-center"
                  style={{border:`1px solid ${comboBorder}`,boxShadow:comboGlow}}>
                  {combo>=3?(
                    combo>=100?(
                      <>
                        <div key={comboBounceKey} className="combo-bounce">
                          <span className="combo-rainbow-text">{combo}×</span>
                        </div>
                        <div className="text-[9px] font-ui -mt-0.5" style={{color:'var(--text-muted)'}}>COMBO</div>
                      </>
                    ):(
                      <div key={comboBounceKey} className="combo-bounce leading-none"
                        style={{fontFamily:"'Boogaloo',sans-serif",fontSize:'2.4rem',
                          color:comboColor,textShadow:`0 0 16px ${comboColor}99`}}>
                        {combo}×
                        <div className="text-[9px] font-ui leading-none -mt-0.5" style={{color:'var(--text-muted)',fontFamily:'Space Mono'}}>COMBO</div>
                      </div>
                    )
                  ):(
                    <>
                      <div className="leading-none" style={{fontFamily:"'Boogaloo',sans-serif",fontSize:'2.4rem',color:'var(--text-muted)'}}>—</div>
                      <div className="text-[9px] font-ui" style={{color:'var(--text-muted)'}}>COMBO</div>
                    </>
                  )}
                </div>
              );
            })()}

            {/* Nitro — pulses when full, flashes text at 100% */}
            <div className="glass-dark rounded-xl px-3 py-2"
              style={{
                border:`1px solid ${nitroCharge>=100?poke.color+'99':nitroCharge>=50?poke.color+'55':'rgba(255,255,255,0.06)'}`,
                boxShadow:nitroCharge>=100?`0 0 16px ${poke.color}55`:'none',
              }}>
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-[9px] font-ui font-bold" style={{color:nitroCharge>=50?poke.color:'var(--text-muted)'}}>NITRO</span>
                <span className="text-[9px] font-ui font-bold" style={{color:nitroCharge>=100?'#fff':nitroCharge>=50?poke.color:'var(--text-muted)'}}>{nitroCharge.toFixed(0)}%</span>
              </div>
              <div className="h-2.5 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.06)'}}>
                <div className={`h-full rounded-full transition-all duration-300 ${nitroCharge>=100?'nitro-full-pulse':''}`}
                  style={{
                    width:`${nitroCharge}%`,
                    background:nitroCharge>=100
                      ?`linear-gradient(90deg,${poke.color},#fff,${poke.color})`
                      :nitroCharge>=50?`linear-gradient(90deg,${poke.color},${poke.color}cc,#ef4444)`
                      :'rgba(255,255,255,0.2)',
                    boxShadow:nitroCharge>=100?`0 0 16px ${poke.color},0 0 6px #fff`:nitroCharge>=50?`0 0 10px ${poke.color}88`:'none',
                    '--pc':poke.color,
                  }}/>
              </div>
              {nitroCharge>=100&&!nitroActive&&(
                <div className="text-[9px] font-ui text-center mt-1 font-black animate-bounce"
                  style={{color:'#fff',textShadow:`0 0 8px ${poke.color}`}}>⚡ TAB NOW! ⚡</div>
              )}
              {nitroCharge>=50&&nitroCharge<100&&!nitroActive&&(
                <div className="text-[8px] font-ui text-center mt-1 font-bold animate-pulse" style={{color:poke.color}}>TAB → BOOST!</div>
              )}
              {nitroActive&&(
                <div className="text-[8px] font-ui text-center mt-1 font-black animate-pulse" style={{color:'#facc15'}}>🚀 BOOSTING!</div>
              )}
            </div>
          </div>

          {/* ═══ TYPING ZONE ═══ */}
          <div className={`typing-zone glass-dark rounded-2xl p-5 ${shaking?'typing-zone-border-error':nitroActive?'typing-zone-border-nitro':''}`}
            style={{border:`1px solid rgba(255,255,255,0.06)`}}
            onClick={()=>captureRef.current?.focus()}>

            {/* 3-line sliding passage viewport */}
            <div ref={passRef} className="passage-viewport">
              <div className="passage-inner" style={{transform:`translateY(-${slideOffset}px)`}}>
                {words.map((word,wi)=>{
                  const isDone=wi<wordIdx;
                  const isCurrent=wi===wordIdx;
                  const doneInfo=completedWords[wi];

                  if(isDone){
                    const isFlashing=wi===flashWordIdx&&doneInfo?.correct;
                    return(
                      <React.Fragment key={wi}>
                        <span className={`${doneInfo?.correct?'word-done-correct':'word-done-error'}${isFlashing?' word-flash-correct':''}`}>{word}</span>
                        <span className="word-space"> </span>
                      </React.Fragment>
                    );
                  }

                  if(isCurrent){
                    const hasErr=currentWordHasError;
                    return(
                      <React.Fragment key={wi}>
                        <span ref={el=>wordRefs.current[wi]=el}
                          className={`word-current${hasErr?' word-error':''}`}>
                          {[...word].map((ch,ci)=>{
                            const typedCh=wordInput[ci];
                            // cursor position — before this char
                            const isCursorHere=ci===wordInput.length;
                            let charCls='char-upcoming';
                            if(typedCh!==undefined){
                              charCls=normalizeChar(typedCh)===normalizeChar(ch)?'char-correct':'char-wrong';
                            }
                            return(
                              <React.Fragment key={ci}>
                                {isCursorHere&&<span className={`char-cursor${hasErr?' char-cursor-error':''}`}/>}
                                <span className={charCls}>{ch}</span>
                              </React.Fragment>
                            );
                          })}
                          {/* cursor at end of word (when all chars typed) */}
                          {wordInput.length>=word.length&&(
                            <span className={`char-cursor${hasErr?' char-cursor-error':''}`}/>
                          )}
                          {/* extra chars typed beyond word length */}
                          {wordInput.length>word.length&&(
                            <span className="char-wrong">{wordInput.slice(word.length)}</span>
                          )}
                        </span>
                        <span className="word-space"> </span>
                      </React.Fragment>
                    );
                  }

                  // Upcoming word
                  return(
                    <React.Fragment key={wi}>
                      <span ref={el=>wordRefs.current[wi]=el} className="word-upcoming">{word}</span>
                      <span className="word-space"> </span>
                    </React.Fragment>
                  );
                })}
              </div>
            </div>

            {/* Status bar below passage */}
            <div className="flex items-center justify-between mt-3 pt-3" style={{borderTop:'1px solid rgba(255,255,255,0.05)'}}>
              <div className="flex items-center gap-3">
                {totalErrors>0&&(
                  <span className="error-counter">✗ {totalErrors} error{totalErrors!==1?'s':''}</span>
                )}
                {totalErrors===0&&wordIdx>0&&(
                  <span className="text-[11px] font-ui" style={{color:'#4ade80'}}>✓ flawless so far</span>
                )}
              </div>
              <div className="flex items-center gap-3">
                {currentWordHasError&&(
                  <span className="text-[10px] font-ui animate-pulse" style={{color:'#ef4444'}}>⌫ fix the word</span>
                )}
                <span className="text-[10px] font-ui" style={{color:'var(--text-muted)'}}>
                  {wordIdx}/{words.length} words
                </span>
              </div>
            </div>

            {/* Hidden keyboard-capture textarea */}
            <textarea ref={captureRef} className="typing-capture"
              value={wordInput}
              onChange={handleChange}
              onKeyDown={handleKeyDown}
              autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
              rows={1}
              aria-label="Type here"
              placeholder={wordIdx===0?'Start typing…':''}
            />
          </div>

          <div className="flex items-center justify-between text-[10px] font-ui" style={{color:'var(--text-muted)'}}>
            <span>ESC restart · TAB nitro</span>
            <span>{typedC}/{totalC} chars</span>
          </div>
        </div>
      );
    }

    /* ═══════════════════ RESULTS ═══════════════════ */
    /* Professor commentary lines */
    const OAK_LINES=[
      [100,"LEGENDARY! You've achieved what few trainers dare dream! 🌟"],
      [80,"Outstanding! The Elite Four would be proud of that performance!"],
      [60,"Impressive! You're becoming a real typing trainer!"],
      [40,"Solid effort! Your typing speed is evolving!"],
      [0,"Keep practicing, trainer! Every champion started somewhere."],
    ];
    function getOakLine(wpm,lectureName){
      const base=OAK_LINES.find(([t])=>wpm>=t)?.[1]||OAK_LINES[4][1];
      if(lectureName&&wpm>=50)return base.replace('!',`! Those ${lectureName} terms are no match for you!`);
      return base;
    }

    function ResultsScreen({result,onMenu,onAgain,onRetry,onNav}){
      const {settings,player,sprites}=useContext(Ctx);
      const poke=POKEMON.find(p=>p.id===settings.selectedPokemon)||POKEMON[0];

      // Animated counting-up stats
      const [dispWpm,setDispWpm]=useState(0);
      const [dispAcc,setDispAcc]=useState(0);
      const [dispTime,setDispTime]=useState(0);
      const [dispCombo,setDispCombo]=useState(0);
      const [xpBarW,setXpBarW]=useState(0);
      const [showRecord,setShowRecord]=useState(false);
      const [oakText,setOakText]=useState('');
      const oakFull=getOakLine(result.wpm,result.lectureName);

      useEffect(()=>{
        const h=(e)=>{if(e.key==="Enter"){e.preventDefault();onAgain?.();}};
        window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
      },[onAgain]);

      // Staggered stat reveal — each card appears with 200ms delay then counts up
      const [statsVisible,setStatsVisible]=useState([false,false,false,false]);
      const [oakBouncing,setOakBouncing]=useState(false);

      useEffect(()=>{
        const dur=900,fps=40,steps=Math.round(dur/(1000/fps));
        // Show placement badge immediately, then stats with stagger
        [0,1,2,3].forEach(idx=>{
          setTimeout(()=>{
            setStatsVisible(prev=>{const n=[...prev];n[idx]=true;return n;});
            // Start count-up when each stat card appears
            let f=0;
            const iv=setInterval(()=>{
              f++;const p=Math.min(1,f/steps);
              const ease=1-Math.pow(1-p,3);
              if(idx===0)setDispWpm(result.wpm*ease);
              else if(idx===1)setDispAcc(result.accuracy*ease);
              else if(idx===2)setDispTime(result.timeSec*ease);
              else if(idx===3)setDispCombo(Math.round(result.bestCombo*ease));
              if(f>=steps){clearInterval(iv);if(idx===3&&result.isNewBest)setTimeout(()=>setShowRecord(true),200);}
            },1000/fps);
          },idx*200);
        });
      },[]);

      // XP bar fill animation
      useEffect(()=>{
        const lvlData=getLevel(result.xpBefore||0);
        const startFrac=(lvlData.currentXp/lvlData.needed)*100;
        setXpBarW(startFrac);
        const t=setTimeout(()=>{
          const afterLvl=getLevel(result.xpAfter||0);
          const endFrac=(afterLvl.currentXp/afterLvl.needed)*100;
          setXpBarW(endFrac);
        },600);
        return()=>clearTimeout(t);
      },[]);

      // Professor Oak typewriter + bounce on start
      useEffect(()=>{
        let i=0;let bounced=false;const t=setInterval(()=>{
          setOakText(oakFull.slice(0,i+1));
          if(!bounced){bounced=true;setOakBouncing(true);setTimeout(()=>setOakBouncing(false),700);}
          i++;
          if(i>=oakFull.length)clearInterval(t);
        },28);
        return()=>clearInterval(t);
      },[]);

      const place=result.placement||1;
      const placeText=["","1st 🥇","2nd 🥈","3rd 🥉","4th","5th"][place]||`${place}th`;
      const placeColor=place===1?"text-yellow-400":place===2?"text-slate-300":place===3?"text-orange-400":"text-slate-400";

      // Passage difficult words (>6 chars)
      const passageWords=result.passage?result.passage.split(/\s+/):[];
      const hardWordSet=new Set(passageWords.filter(w=>w.replace(/[^a-z]/gi,'').length>6).map(w=>w.toLowerCase().replace(/[^a-z]/gi,'')));

      // XP bar levels
      const lvlBefore=result.levelBefore||getLevel(result.xpBefore||0).level;
      const lvlAfter=result.levelAfter||getLevel(result.xpAfter||0).level;
      const leveledUp=lvlAfter>lvlBefore;

      // WPM history mini chart
      const hist=result.wpmHistory||[];
      const maxH=Math.max(...hist.map(h=>h.wpm),1);

      return(
        <div className="space-y-5 animate-fade">
          {/* Hero header */}
          <div className="text-center py-3 relative">
            <div className="text-7xl mb-2 animate-finish inline-block">
              {sprites[poke.id]&&!result._spriteFailed
                ?<img src={sprites[poke.id]} alt={poke.name} width={80} height={80} style={{imageRendering:'pixelated',filter:'drop-shadow(0 0 16px '+poke.color+'88)'}} onError={()=>{}}/>
                :<span style={{filter:'drop-shadow(0 0 16px '+poke.color+'88)'}}>{poke.emoji}</span>
              }
            </div>
            <h2 className={`text-3xl md:text-4xl font-black ${placeColor}`} style={{fontFamily:"'Fredoka One',sans-serif"}}>{placeText} Place!</h2>
            {result.lectureName&&<p className="text-xs text-slate-400 mt-1">📚 {result.lectureName}</p>}
            {showRecord&&(
              <div className="inline-flex items-center gap-1.5 mt-2 px-3 py-1.5 rounded-full text-sm font-black animate-bounce"
                style={{background:'linear-gradient(135deg,#facc15,#f97316)',color:'#000'}}>
                🏆 NEW RECORD!
              </div>
            )}
          </div>

          {/* Stats grid — staggered reveal */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div style={{opacity:statsVisible[0]?1:0,transform:statsVisible[0]?'translateY(0)':'translateY(12px)',transition:'opacity 0.3s,transform 0.3s'}}>
              <ResultCard label="WPM" value={dispWpm.toFixed(1)} color={dispWpm>=100?"text-red-400":dispWpm>=80?"text-orange-400":dispWpm>=60?"text-yellow-400":"text-blue-300"} glow={result.isNewBest}/>
            </div>
            <div style={{opacity:statsVisible[1]?1:0,transform:statsVisible[1]?'translateY(0)':'translateY(12px)',transition:'opacity 0.3s,transform 0.3s'}}>
              <ResultCard label="Accuracy" value={`${dispAcc.toFixed(1)}%`} color={dispAcc>=99?"text-green-400":dispAcc>=95?"text-blue-400":"text-slate-300"}/>
            </div>
            <div style={{opacity:statsVisible[2]?1:0,transform:statsVisible[2]?'translateY(0)':'translateY(12px)',transition:'opacity 0.3s,transform 0.3s'}}>
              <ResultCard label="Time" value={`${dispTime.toFixed(1)}s`} color="text-purple-400"/>
            </div>
            <div style={{opacity:statsVisible[3]?1:0,transform:statsVisible[3]?'translateY(0)':'translateY(12px)',transition:'opacity 0.3s,transform 0.3s'}}>
              <ResultCard label="Best Combo" value={`${dispCombo}x`} color="text-orange-400"/>
            </div>
          </div>

          <div className="grid md:grid-cols-2 gap-4">
            {/* XP bar */}
            <div className="glass-dark rounded-2xl p-4 border border-yellow-500/20">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs text-slate-400">Experience</span>
                <span className="text-sm font-black text-yellow-400">+{result.xpEarned} XP</span>
              </div>
              {result.bonusXP>0&&<div className="text-[10px] text-green-400 mb-2">+{result.bonusXP} bonus XP</div>}
              <div className="flex items-center gap-2 text-[10px] text-slate-500 mb-1">
                <span>Lv {lvlBefore}</span>
                {leveledUp&&<span className="text-yellow-400 font-bold animate-pulse">→ Lv {lvlAfter} ✨</span>}
                <span className="ml-auto">Lv {lvlAfter}</span>
              </div>
              <div className="h-3 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.08)'}}>
                <div className="h-full rounded-full transition-all duration-700"
                  style={{width:`${xpBarW}%`,background:'linear-gradient(90deg,#facc15,#f97316)'}}/>
              </div>
            </div>

            {/* WPM chart or race stats */}
            <div className="glass-dark rounded-2xl p-4 border border-slate-700/30">
              {hist.length>1?(
                <>
                  <div className="text-xs text-slate-400 mb-2 font-bold">WPM Over Time</div>
                  <div className="flex items-end gap-[3px] h-14">
                    {hist.map((h,i)=>{
                      const pct=(h.wpm/maxH)*100;
                      const col=h.wpm>=80?'#f97316':h.wpm>=60?'#facc15':'#38bdf8';
                      return(<div key={i} className="flex-1 rounded-t transition-all" style={{height:`${Math.max(pct,4)}%`,background:col}}/>);
                    })}
                  </div>
                  <div className="flex justify-between text-[8px] text-slate-500 mt-1"><span>Start</span><span>Finish</span></div>
                </>
              ):(
                <div className="space-y-2 text-xs">
                  <div className="flex justify-between"><span className="text-slate-400">Errors</span><span className="font-mono text-red-400">{result.totalErrors||0}</span></div>
                  <div className="flex justify-between"><span className="text-slate-400">Nitros used</span><span className="font-mono text-blue-400">{result.raceNitros||0}</span></div>
                  <div className="flex justify-between"><span className="text-slate-400">Perfect words</span><span className="font-mono text-green-400">{result.perfectWords||0}</span></div>
                </div>
              )}
            </div>
          </div>

          {/* Passage with hard words highlighted */}
          {passageWords.length>0&&(
            <div className="glass-dark rounded-2xl p-4 border border-slate-700/30">
              <div className="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Passage — <span className="text-yellow-400">highlighted: tricky words</span></div>
              <p className="text-xs leading-relaxed font-mono" style={{color:'var(--text-muted)'}}>
                {passageWords.map((word,i)=>{
                  const clean=word.toLowerCase().replace(/[^a-z]/gi,'');
                  const hard=hardWordSet.has(clean);
                  return <span key={i}>{i>0?' ':''}<span style={hard?{color:'#facc15',fontWeight:700}:{}}>{word}</span></span>;
                })}
              </p>
            </div>
          )}

          {/* Professor Oak commentary */}
          <div className="glass-dark rounded-2xl p-3 border border-purple-500/20 flex items-start gap-3">
            <div className={`flex-shrink-0 ${oakBouncing?'oak-bounce':''}`} style={{display:'flex',alignItems:'center'}}>
              <span className="text-2xl">🧪</span>
            </div>
            <div>
              <div className="text-[10px] font-bold text-purple-400 mb-1">Professor Oak</div>
              <p className="text-xs" style={{color:'var(--text-bright)',minHeight:'1.5em'}}>{oakText}<span className="animate-pulse">▌</span></p>
            </div>
          </div>

          {/* Action buttons */}
          <div className="flex flex-wrap gap-3 justify-center pt-1">
            <button onClick={onAgain}
              className="px-6 py-3 rounded-2xl bg-gradient-to-r from-red-500 via-yellow-500 to-blue-500 text-white font-black shadow-xl hover:shadow-2xl transition-all active:scale-[0.97]"
              style={{fontFamily:"'Fredoka One',sans-serif"}}>
              Race Again
            </button>
            {onRetry&&result.passage&&(
              <button onClick={onRetry}
                className="px-6 py-3 rounded-2xl glass border border-yellow-500/40 font-bold text-yellow-400 transition-all hover:border-yellow-400 active:scale-[0.97]">
                🔁 Retry Passage
              </button>
            )}
            <button onClick={()=>onNav("garage")}
              className="px-6 py-3 rounded-2xl glass border border-slate-600 font-bold transition-all hover:border-slate-400 active:scale-[0.97]">
              🏠 Garage
            </button>
            <button onClick={onMenu}
              className="px-6 py-3 rounded-2xl glass border border-slate-600 font-bold transition-all hover:border-slate-400 active:scale-[0.97]">
              Menu
            </button>
          </div>
          <p className="text-center text-[10px] text-slate-500">Press Enter to race again</p>
        </div>
      );
    }
    function ResultCard({label,value,color,glow}){
      return(
        <div className={`glass-dark rounded-2xl p-4 border text-center transition-all ${glow?'border-yellow-400/40':'border-slate-700/30'}`}
          style={glow?{boxShadow:'0 0 20px rgba(250,204,21,0.15)'}:{}}>
          <div className={`text-3xl font-black font-mono ${color}`} style={glow?{textShadow:'0 0 15px rgba(250,204,21,0.5)'}:{}}>{value}</div>
          <div className="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">{label}</div>
        </div>
      );
    }

    /* ═══════════════════ GARAGE ═══════════════════ */
    const PASSIVE_COLORS={
      no_combo_reset:'text-purple-300 border-purple-500/40 bg-purple-500/10',
      fast_nitro:'text-yellow-300 border-yellow-500/40 bg-yellow-500/10',
      tank:'text-cyan-300 border-cyan-500/40 bg-cyan-500/10',
      sprint:'text-orange-300 border-orange-500/40 bg-orange-500/10',
      error_burst:'text-red-300 border-red-500/40 bg-red-500/10',
      slow_start:'text-slate-300 border-slate-500/40 bg-slate-500/10',

    /* ─── helpers ─── */
    function textToPassages(text,maxLen=520){
      const clean=text.replace(/\s+/g,' ').trim();
      if(!clean||clean.length<20)return[];
      if(clean.length<=maxLen)return[clean];
      const out=[];let start=0;
      while(start<clean.length){
        let end=Math.min(start+maxLen,clean.length);
        if(end<clean.length){
          const sub=clean.slice(start,end);
          const last=Math.max(sub.lastIndexOf('. '),sub.lastIndexOf('! '),sub.lastIndexOf('? '));
          if(last>maxLen*0.4)end=start+last+2;
        }
        const chunk=clean.slice(start,end).trim();
        if(chunk.length>20)out.push(chunk);
        start=end;
      }
      return out;
    }
    function suggestTag(name='',text=''){
      const h=(name+' '+text.slice(0,200)).toLowerCase();
      const map={
        'Biology':['bio','cell','gene','evol','dna','organism','organelle','tissue','metabol','anatomy','photosyn'],
        'Chemistry':['chem','mol','atom','react','bond','acid','compound','element'],
        'Physics':['physic','force','energy','wave','quant','thermo','optic'],
        'Mathematics':['math','calcul','algeb','geom','statist','probab','theorem'],
        'History':['histor','war','century','civiliz','empire','revolut','ancient'],
        'Economics':['econ','market','gdp','trade','fiscal','inflat','supply'],
        'Literature':['liter','novel','poem','author','charact','theme','narrator'],
        'Computer Science':['comput','algorithm','program','data struct','code','software','network'],
        'Psychology':['psychol','behav','cognit','mental','therap','brain','freud'],
        'Medicine':['medic','disease','diagn','treatment','symptom','patient','clinic'],
      };
      for(const[tag,kws]of Object.entries(map))if(kws.some(k=>h.includes(k)))return tag;
      return'';
    }

    /* ─── LectureManager ─── */
    function LectureManager(){
      const {lectures,setLectures,races,startPractice}=useContext(Ctx);
      const [tab,setTab]=useState('paste');
      const [pasteName,setPasteName]=useState('');
      const [pasteText,setPasteText]=useState('');
      const [urlInput,setUrlInput]=useState('');
      const [importing,setImporting]=useState(false);
      const [dragOver,setDragOver]=useState(false);
      const fileRef=useRef(null);

      const createLecture=(name,text)=>{
        const passages=textToPassages(text);
        if(!passages.length){alert('No usable text found. Try a longer passage.');return;}
        const tag=suggestTag(name,text);
        const id='lec_'+Date.now();
        setLectures(p=>[...p,{id,name:name.trim()||'Untitled',tag,passages}]);
        setPasteName('');setPasteText('');setUrlInput('');
      };

      const handleFile=async(file)=>{
        if(!file)return;
        const name=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
        try{
          const text=await file.text();
          createLecture(name,text);
        }catch(e){alert('Could not read file.');}
      };

      const handleUrl=async()=>{
        const url=urlInput.trim();if(!url)return;
        setImporting(true);
        try{
          const res=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
          if(!res.ok)throw new Error();
          const data=await res.json();
          const text=(data.contents||'').replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
            .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
            .replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
          const name=url.replace(/.*\/([^/?#]+).*/,'$1').replace(/[-_.]/g,' ').slice(0,40)||'Imported';
          createLecture(name,text);
        }catch(e){alert('Import failed — check the URL or paste the text directly.');}
        setImporting(false);
      };

      const delLec=(id)=>{if(!confirm('Delete this lecture and all its passages?'))return;setLectures(p=>p.filter(l=>l.id!==id));};
      const renameLec=(id,name)=>{if(name)setLectures(p=>p.map(l=>l.id===id?{...l,name}:l));};
      const tagLec=(id,tag)=>{setLectures(p=>p.map(l=>l.id===id?{...l,tag}:l));};

      /* Empty state */
      if(lectures.length===0)return(
        <div className="animate-fade">
          <h2 className="text-2xl font-black mb-6 flex items-center gap-2" style={{fontFamily:"'Fredoka One',sans-serif"}}>📚 Study Deck</h2>
          <div className="empty-state glass-dark rounded-3xl" style={{border:'1px solid rgba(255,255,255,0.07)'}}>
            <ProfOak size={140}/>
            <div>
              <h3 className="text-2xl font-black gradient-text mb-1" style={{fontFamily:"'Fredoka One',sans-serif"}}>Professor Oak wants you to study!</h3>
              <p className="text-sm" style={{color:'var(--text-muted)'}}>Upload your lecture notes to begin your Typing Journey™</p>
            </div>
            {/* Inline upload form */}
            <div className="w-full max-w-lg space-y-3">
              <input value={pasteName} onChange={e=>setPasteName(e.target.value)} placeholder="Lecture name (e.g. Biology Chapter 3)"
                className="w-full px-4 py-3 rounded-xl text-sm focus:outline-none"
                style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.1)',color:'var(--text-bright)'}}/>
              <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={5}
                placeholder="Paste your lecture notes here…"
                className="w-full px-4 py-3 rounded-xl text-sm resize-none focus:outline-none font-mono"
                style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.1)',color:'var(--text-bright)'}}/>
              <button onClick={()=>createLecture(pasteName||'My First Lecture',pasteText)}
                disabled={!pasteText.trim()}
                className="w-full py-3 rounded-xl font-black text-sm transition-all hover:scale-[1.02] disabled:opacity-40"
                style={{background:'linear-gradient(135deg,#ef4444,#facc15)',color:'#000',fontFamily:"'Fredoka One',sans-serif",fontSize:'1rem'}}>
                🚀 Upload First Lecture
              </button>
              <p className="text-[10px] font-ui" style={{color:'var(--text-muted)'}}>Or drag & drop a .txt file anywhere on the page</p>
            </div>
          </div>
        </div>
      );

      return(
        <div className="space-y-5 animate-fade">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <h2 className="text-2xl font-black flex items-center gap-2" style={{fontFamily:"'Fredoka One',sans-serif"}}>📚 Study Deck
              <span className="text-sm font-normal px-2 py-0.5 rounded-full" style={{background:'rgba(255,255,255,0.08)',color:'var(--text-muted)'}}>{lectures.length} lecture{lectures.length!==1?'s':''}</span>
            </h2>
          </div>

          {/* ── Add new lecture ── */}
          <div className="glass-dark rounded-2xl p-4 space-y-3" style={{border:'1px solid rgba(255,255,255,0.07)'}}>
            <div className="text-[11px] font-bold font-ui" style={{color:'var(--text-muted)'}}>ADD NEW LECTURE</div>
            <div className="upload-tabs">
              {[['paste','✏️ Paste Text'],['file','📄 Upload File'],['url','🔗 Import URL']].map(([id,label])=>(
                <button key={id} className={`upload-tab${tab===id?' active':''}`} onClick={()=>setTab(id)}>{label}</button>
              ))}
            </div>

            {tab==='paste'&&(
              <div className="space-y-2">
                <input value={pasteName} onChange={e=>setPasteName(e.target.value)} placeholder="Lecture name…"
                  className="w-full px-3 py-2 rounded-xl text-sm focus:outline-none"
                  style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.09)',color:'var(--text-bright)'}}/>
                <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={4}
                  placeholder="Paste lecture notes, textbook excerpts, study material…"
                  className="w-full px-3 py-2 rounded-xl text-sm resize-none focus:outline-none font-mono"
                  style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.09)',color:'var(--text-bright)'}}/>
                <div className="flex items-center justify-between">
                  <span className="text-[10px] font-ui" style={{color:'var(--text-muted)'}}>
                    {pasteText.trim().split(/\s+/).filter(Boolean).length} words · {textToPassages(pasteText).length} passages
                  </span>
                  <button onClick={()=>createLecture(pasteName,pasteText)} disabled={!pasteText.trim()||!pasteName.trim()}
                    className="px-4 py-2 rounded-xl text-sm font-bold transition-all hover:scale-105 disabled:opacity-40"
                    style={{background:'linear-gradient(135deg,#ef4444,#facc15)',color:'#000'}}>
                    Add Lecture
                  </button>
                </div>
              </div>
            )}

            {tab==='file'&&(
              <div>
                <div className={`upload-zone${dragOver?' upload-zone-drag':''}`}
                  onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                  onDragLeave={()=>setDragOver(false)}
                  onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}
                  onClick={()=>fileRef.current?.click()}>
                  <input ref={fileRef} type="file" accept=".txt,.md,.text" className="hidden" onChange={e=>{handleFile(e.target.files[0]);e.target.value='';}}/>
                  <div className="text-3xl mb-2">📄</div>
                  <div className="text-sm font-bold" style={{color:'var(--text-bright)'}}>Drop a .txt file or click to browse</div>
                  <div className="text-[11px] mt-1" style={{color:'var(--text-muted)'}}>Automatically splits into race-sized passages</div>
                </div>
              </div>
            )}

            {tab==='url'&&(
              <div className="space-y-2">
                <div className="flex gap-2">
                  <input value={urlInput} onChange={e=>setUrlInput(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&handleUrl()}
                    placeholder="https://en.wikipedia.org/wiki/…"
                    className="flex-1 px-3 py-2 rounded-xl text-sm focus:outline-none"
                    style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.09)',color:'var(--text-bright)'}}/>
                  <button onClick={handleUrl} disabled={!urlInput.trim()||importing}
                    className="px-4 py-2 rounded-xl text-sm font-bold transition-all hover:scale-105 disabled:opacity-40 whitespace-nowrap"
                    style={{background:'linear-gradient(135deg,#60a5fa,#818cf8)',color:'#fff'}}>
                    {importing?'Importing…':'Import'}
                  </button>
                </div>
                <p className="text-[10px] font-ui" style={{color:'var(--text-muted)'}}>Works best with Wikipedia articles and plain-text pages. Requires internet.</p>
              </div>
            )}
          </div>

          {/* ── Lecture cards grouped by class ── */}
          {(()=>{
            const grouped={};
            lectures.forEach(lec=>{const g=lec.tag||'General';if(!grouped[g])grouped[g]=[];grouped[g].push(lec);});
            const groupKeys=Object.keys(grouped).sort((a,b)=>a==='General'?1:b==='General'?-1:a.localeCompare(b));
            const multiGroup=groupKeys.length>1;
            return groupKeys.map(group=>(
              <div key={group} className="space-y-2">
                {multiGroup&&(
                  <div className="flex items-center gap-2 mt-2">
                    <span className="text-xs font-black font-ui uppercase tracking-widest" style={{color:'var(--accent-primary)'}}>{group}</span>
                    <div className="flex-1 h-px" style={{background:'rgba(255,255,255,0.07)'}}/>
                    <span className="text-[9px] font-ui" style={{color:'var(--text-muted)'}}>{grouped[group].length} lecture{grouped[group].length!==1?'s':''}</span>
                  </div>
                )}
                <div className="grid md:grid-cols-2 gap-3">
                  {grouped[group].map(lec=>(
                    <LectureCard key={lec.id} lec={lec} races={races}
                      onDelete={()=>delLec(lec.id)}
                      onPractice={()=>startPractice(lec.id)}
                      onRename={renameLec}
                      onTagEdit={tagLec}/>
                  ))}
                </div>
              </div>
            ));
          })()}
        </div>
      );
    }

    /* ═══════════════════ STATS ═══════════════════ */
    function Stats(){
      const {races,player}=useContext(Ctx);
      const stats=getStats(races,player);
      const avg=calcAvgWPM(races);
      const avgAcc=races.length?races.reduce((a,r)=>a+r.accuracy,0)/races.length:0;
      const totalTime=races.reduce((a,r)=>a+(r.timeSec||0),0);
      const chartData=races.slice(-40);
      const maxW=Math.max(...chartData.map(r=>r.wpm),1);
      const lvl=getLevel(player.xp);

      return(
        <div className="space-y-5 animate-fade">
          <h2 className="text-2xl font-black flex items-center gap-2" style={{fontFamily:"'Fredoka One',sans-serif"}}>📊 Statistics</h2>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-2.5">
            <MiniStat icon="🏁" label="Races" value={stats.totalRaces} color="text-blue-400"/>
            <MiniStat icon="⚡" label="Best WPM" value={stats.bestWpm.toFixed(0)} color="text-yellow-400"/>
            <MiniStat icon="📈" label="Avg WPM" value={avg.toFixed(0)} color="text-green-400"/>
            <MiniStat icon="🎯" label="Avg Acc" value={`${avgAcc.toFixed(1)}%`} color="text-blue-300"/>
            <MiniStat icon="💯" label="Perfect" value={stats.perfectRaces} color="text-pink-400"/>
            <MiniStat icon="🔥" label="Streak" value={`${stats.streak}d`} color="text-orange-400"/>
            <MiniStat icon="👑" label="Best Combo" value={`${stats.bestCombo}x`} color="text-amber-400"/>
            <MiniStat icon="⏱️" label="Time" value={`${(totalTime/60).toFixed(0)}m`} color="text-purple-400"/>
          </div>

          {/* WPM Chart */}
          {chartData.length>1&&(
            <div className="glass-dark rounded-2xl p-4 border border-slate-700/30">
              <h3 className="text-sm font-black mb-3" style={{fontFamily:"'Fredoka One',sans-serif"}}>WPM Trend</h3>
              <div className="flex items-end gap-[2px] h-36">
                {chartData.map((r,i)=>{
                  const h=(r.wpm/maxW)*100;
                  const col=r.wpm>=70?"from-yellow-400 to-red-400":r.wpm>=50?"from-green-400 to-blue-400":"from-blue-400 to-purple-400";
                  return(
                    <div key={i} className="flex-1 flex flex-col items-center justify-end group relative">
                      <div className="absolute -top-7 glass text-[8px] px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity font-mono whitespace-nowrap z-10">
                        {r.wpm.toFixed(0)} WPM · {r.accuracy.toFixed(0)}%
                      </div>
                      <div className={`w-full rounded-t bg-gradient-to-t ${col} transition-all hover:brightness-125`} style={{height:`${Math.max(h,3)}%`}}/>
                    </div>
                  );
                })}
              </div>
              <div className="flex justify-between text-[8px] text-slate-500 mt-1">
                <span>Oldest</span><span>Last {chartData.length} races</span><span>Latest</span>
              </div>
            </div>
          )}

          {/* Race log */}
          {races.length>0&&(
            <div className="glass-dark rounded-2xl p-4 border border-slate-700/30">
              <h3 className="text-sm font-black mb-3" style={{fontFamily:"'Fredoka One',sans-serif"}}>Race Log</h3>
              <div className="max-h-60 overflow-auto">
                <table className="w-full text-[10px]">
                  <thead><tr className="text-slate-400 border-b border-slate-700">
                    <th className="py-1.5 text-left">#</th><th className="py-1.5 text-left">Date</th><th className="py-1.5">Pokemon</th>
                    <th className="py-1.5 text-right">WPM</th><th className="py-1.5 text-right">Acc</th><th className="py-1.5 text-right">XP</th>
                  </tr></thead>
                  <tbody>{[...races].reverse().map((r,i)=>{
                    const pk=POKEMON.find(x=>x.id===r.pokemon)||POKEMON[0];
                    return(
                      <tr key={r.id} className="border-b border-slate-800/30 hover:bg-slate-800/20">
                        <td className="py-1 text-slate-500">{races.length-i}</td>
                        <td className="py-1 text-slate-400">{new Date(r.timestamp).toLocaleDateString()}</td>
                        <td className="py-1 text-center">{pk.emoji}</td>
                        <td className="py-1 text-right font-mono text-yellow-400">{r.wpm.toFixed(1)}</td>
                        <td className="py-1 text-right font-mono text-blue-300">{r.accuracy.toFixed(1)}%</td>
                        <td className="py-1 text-right font-mono text-green-400">+{r.xpEarned||0}</td>
                      </tr>
                    );
                  })}</tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════ ACHIEVEMENTS ═══════════════════ */
    function AchScreen(){
      const {achievements}=useContext(Ctx);
      return(
        <div className="space-y-5 animate-fade">
          <h2 className="text-2xl font-black flex items-center gap-2" style={{fontFamily:"'Fredoka One',sans-serif"}}>🏆 Achievements</h2>
          <p className="text-sm text-slate-400">{achievements.length} of {ACHIEVEMENTS.length} unlocked</p>
          <div className="w-full bg-slate-800 rounded-full h-3 overflow-hidden">
            <div className="h-full bg-gradient-to-r from-red-500 via-yellow-500 to-blue-500 rounded-full transition-all" style={{width:`${(achievements.length/ACHIEVEMENTS.length)*100}%`}}/>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
            {ACHIEVEMENTS.map(a=>{
              const u=achievements.includes(a.id);
              return(
                <div key={a.id} className={`rounded-2xl p-4 border transition-all ${u?"glass-dark border-yellow-500/30 bg-yellow-500/5":"glass-dark border-slate-800 opacity-40"}`}>
                  <div className="flex items-center gap-3">
                    <div className={`text-3xl ${u?"":"grayscale"}`}>{a.icon}</div>
                    <div>
                      <div className={`text-sm font-black ${u?"text-yellow-300":"text-slate-400"}`}>{a.name}</div>
                      <div className="text-[10px] text-slate-400">{a.desc}</div>
                    </div>
                  </div>
                  {u&&<div className="text-[8px] text-yellow-500 mt-2 font-black uppercase tracking-widest">Caught!</div>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ═══════════════════ SETTINGS ═══════════════════ */
    function SettingsScreen(){
      const {settings,setSetting,lectures,setLectures,races,setRaces,player,setPlayer}=useContext(Ctx);
      const fileRef=useRef(null);
      const exportAll=()=>{
        const d={version:3,date:new Date().toISOString(),lectures:load(STORE_KEYS.lectures,[]),races:load(STORE_KEYS.races,[]),settings:load(STORE_KEYS.settings,DEFAULT_SETTINGS),
          achievements:load(STORE_KEYS.achievements,[]),player:load(STORE_KEYS.player,DEFAULT_PLAYER)};
        const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
        const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`pokemontype-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);
      };
      const importAll=(e)=>{
        const f=e.target.files?.[0];if(!f)return;
        const r=new FileReader();
        r.onload=(ev)=>{
          try{const d=JSON.parse(ev.target.result);
            if(d.lectures){save(STORE_KEYS.lectures,d.lectures);setLectures(d.lectures);}
            if(d.races){save(STORE_KEYS.races,d.races);setRaces(d.races);}
            if(d.settings)save(STORE_KEYS.settings,d.settings);
            if(d.achievements)save(STORE_KEYS.achievements,d.achievements);
            if(d.player){save(STORE_KEYS.player,d.player);setPlayer(d.player);}
            alert("Imported! Refreshing...");location.reload();
          }catch{alert("Invalid file!");}
        };r.readAsText(f);
      };

      return(
        <div className="space-y-5 animate-fade max-w-2xl mx-auto">
          <h2 className="text-2xl font-black flex items-center gap-2" style={{fontFamily:"'Fredoka One',sans-serif"}}>⚙️ Settings</h2>
          <div className="space-y-3">
            <SetRow label="Theme" desc="Visual theme">
              <select value={settings.theme} onChange={e=>setSetting("theme",e.target.value)} className="px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm">
                <option value="dark">Dark</option><option value="light">Light</option>
              </select>
            </SetRow>
            <SetRow label="Difficulty" desc="Passage length & bot speed">
              <select value={settings.difficulty} onChange={e=>setSetting("difficulty",e.target.value)} className="px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm">
                <option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option>
              </select>
            </SetRow>
            <SetRow label="Sound" desc="Effects & music">
              <button onClick={()=>setSetting("soundOn",!settings.soundOn)}
                className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${settings.soundOn?"bg-yellow-500/20 text-yellow-300 border border-yellow-500/30":"glass-dark border border-slate-700 text-slate-400"}`}>
                {settings.soundOn?"On":"Off"}
              </button>
            </SetRow>
          </div>
          <hr className="border-slate-700/50"/>
          <h3 className="text-lg font-black" style={{fontFamily:"'Fredoka One',sans-serif"}}>Data</h3>
          <div className="flex flex-wrap gap-2">
            <button onClick={exportAll} className="px-4 py-2 rounded-xl glass border border-slate-700 text-sm hover:border-slate-500">📤 Export</button>
            <button onClick={()=>fileRef.current?.click()} className="px-4 py-2 rounded-xl glass border border-slate-700 text-sm hover:border-slate-500">📥 Import</button>
            <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={importAll}/>
            <button onClick={()=>{if(confirm("Delete ALL data?")){Object.values(STORE_KEYS).forEach(k=>localStorage.removeItem(k));location.reload();}}}
              className="px-4 py-2 rounded-xl border border-red-500/30 text-red-400 text-sm hover:bg-red-500/10">🗑️ Clear All</button>
          </div>
        </div>
      );
    }
    function SetRow({label,desc,children}){
      return(
        <div className="glass-dark rounded-2xl p-4 border border-slate-700/30 flex items-center justify-between">
          <div><div className="text-sm font-bold">{label}</div><div className="text-[10px] text-slate-400">{desc}</div></div>
          {children}
        </div>
      );
    }

    /* ═══════════════════ MOUNT ═══════════════════ */
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
